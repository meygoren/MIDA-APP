<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wholesale Ops</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1a1d23;
    --muted: #6b7280;
    /* MIDA brand palette, sampled from the company logo (blue swirl + lime-green swirl) */
    --brand-blue: #1668b8;
    --brand-blue-dark: #0d4c8c;
    --brand-navy: #0a2e4d;
    --brand-green: #8dc63f;
    --brand-green-dark: #6fa82e;
    --primary: var(--brand-blue);
    --primary-dark: var(--brand-blue-dark);
    --danger: #dc2626;
    --success: var(--brand-green-dark);
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }

  /* Login */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 320px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .login-box .brand-mark { justify-content: center; margin-bottom: 20px; }
  .login-box h1 { font-size: 18px; margin: 0 0 24px; color: var(--muted); font-weight: 600; }
  .login-box input { width: 100%; padding: 12px; font-size: 20px; text-align: center; letter-spacing: 4px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; }
  .login-box button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; }
  .login-box button:hover { background: var(--primary-dark); }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 18px; }

  /* Brand mark (styled placeholder until the real logo asset is embedded) */
  .brand-mark { display: flex; align-items: center; gap: 10px; }
  .brand-mark .swirl { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; background: conic-gradient(from 200deg, var(--brand-blue) 0deg, var(--brand-blue) 150deg, var(--brand-green) 160deg, var(--brand-green) 340deg, var(--brand-blue) 360deg); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.15); }
  .brand-mark .wordmark { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
  .brand-mark .wordmark .m, .brand-mark .wordmark .d, .brand-mark .wordmark .a { color: var(--brand-blue); }
  .brand-mark .wordmark .i { color: var(--brand-green); }
  #sidebar .brand-mark .wordmark .m, #sidebar .brand-mark .wordmark .d, #sidebar .brand-mark .wordmark .a { color: #fff; }
  #sidebar .brand-mark .wordmark .i { color: var(--brand-green); }

  /* Shell: off-canvas sidebar so content is always full width, mobile-friendly */
  #app-shell { display: none; min-height: 100vh; }
  #app-shell.active { display: block; }
  #sidebar-toggle { position: fixed; top: 12px; left: 12px; z-index: 120; width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); font-size: 18px; line-height: 1; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  #sidebar-overlay.open { opacity: 1; pointer-events: auto; }
  #sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 240px; background: var(--brand-navy); color: #cbd5e1; flex-shrink: 0; display: flex; flex-direction: column; z-index: 110; transform: translateX(-100%); transition: transform 0.2s ease; }
  #sidebar.open { transform: translateX(0); }
  #sidebar .brand { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  #sidebar nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  #sidebar nav a { display: block; padding: 10px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; cursor: pointer; }
  #sidebar nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
  #sidebar nav a.active { background: var(--brand-blue); color: #fff; }
  #main { display: flex; flex-direction: column; min-width: 0; width: 100%; }
  #topbar { height: 56px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; padding: 0 24px 0 64px; gap: 16px; }
  #topbar .user-name { font-size: 14px; color: var(--muted); }
  #topbar button, #topbar select { padding: 6px 10px; border: 1px solid var(--border); background: #fff; border-radius: 6px; font-size: 13px; }
  #content { padding: 24px; }
  @media (max-width: 640px) {
    #topbar { padding-left: 60px; flex-wrap: wrap; height: auto; padding-top: 10px; padding-bottom: 10px; }
    #content { padding: 16px; }
  }

  h2.page-title { margin: 0 0 20px; font-size: 20px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: #fff; font-size: 13px; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-danger { color: var(--danger); }
  .btn-sm { padding: 4px 8px; font-size: 12px; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: #fafbfc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; }
  tr:last-child td { border-bottom: none; }
  .empty-row td { text-align: center; color: var(--muted); padding: 32px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; background: #eef2ff; color: #4338ca; }
  .badge.status-draft { background: #f3f4f6; color: #4b5563; }
  .badge.status-sent { background: #dbeafe; color: #1e40af; }
  .badge.status-accepted, .badge.status-deposit_paid { background: #fef3c7; color: #92400e; }
  .badge.status-in_production { background: #ede9fe; color: #5b21b6; }
  .badge.status-balance_paid, .badge.status-shipped { background: #d1fae5; color: #065f46; }
  .badge.status-closed { background: #e5e7eb; color: #374151; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; }
  .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: #fff; border-radius: var(--radius); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 24px; }
  .modal h3 { margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; }
  .field textarea { min-height: 70px; resize: vertical; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkbox-group label { font-weight: 400; display: flex; align-items: center; gap: 6px; margin-bottom: 6px; color: var(--text); font-size: 13px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  .line-items-table { width: 100%; margin-bottom: 8px; }
  .line-items-table th, .line-items-table td { padding: 6px; font-size: 12px; }
  .line-items-table input { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 4px; }
  .wa-link { color: var(--success); text-decoration: none; font-size: 12px; }
  .wa-link:hover { text-decoration: underline; }
  .muted { color: var(--muted); }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1d23; color: #fff; padding: 12px 18px; border-radius: 6px; font-size: 13px; z-index: 200; }

  /* Calendar (Scheduling) */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-header { margin-bottom: 4px; font-size: 11px; text-transform: uppercase; color: var(--muted); text-align: center; }
  .cal-cell { min-height: 72px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 4px; font-size: 11px; }
  .cal-cell.empty { background: transparent; border: none; }
  .cal-day { font-weight: 600; margin-bottom: 4px; }
  .cal-chip { background: #eef2ff; color: #4338ca; border-radius: 4px; padding: 2px 4px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-chip-po { background: #fef3c7; color: #92400e; }
  @media (max-width: 640px) {
    .cal-cell { min-height: 48px; font-size: 10px; }
  }
</style>
</head>

<div id="login-screen">

</div>

<div id="app-shell">

  <div id="sidebar-overlay"></div>
  <div id="sidebar">
    <div class="brand">

    <nav id="nav-links"></nav>
  </div>
  <div id="main">
    <div id="topbar">
      <select id="lang-toggle">
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
      <span class="user-name" id="topbar-user"></span>
      <button id="logout-btn">Logout</button>
    </div>
    <div id="content"></div>
  </div>
</div>

    if (!S.user) return false;

    if (!pageDef.page) return true;
    return (S.user.pages || []).includes(pageDef.page);
  }

  // ---------------------------------------------------------------------
  // API helper
  // ---------------------------------------------------------------------
  async function api(path, { method = 'GET', body } = {}) {
    const res = await fetch('/api/' + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(S.token ? { Authorization: 'Bearer ' + S.token } : {}),
      },
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    if (res.status === 401) {
      doLogout();
      throw new Error('Unauthorized');
    }
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function fmtMoney(n, currency) {
    return `${currency || 'USD'} ${Number(n || 0).toFixed(2)}`;
  }

  function waLink(phone, text) {
    const digits = String(phone || '').replace(/[^\d]/g, '');
    if (!digits) return null;
    const q = text ? `?text=${encodeURIComponent(text)}` : '';
    return `https://wa.me/${digits}${q}`;
  }

  const loginScreen = document.getElementById('login-screen');
  const appShell = document.getElementById('app-shell');
  const pinInput = document.getElementById('pin-input');
  const loginError = document.getElementById('login-error');

  async function doLogin() {
    loginError.textContent = '';
    const pin = pinInput.value.trim();
    if (!pin) return;
    try {
      const data = await api('auth', { method: 'POST', body: { pin } });
      S.token = data.token;
      S.user = data.user;
      localStorage.setItem('wo_token', S.token);
      localStorage.setItem('wo_user', JSON.stringify(S.user));
      pinInput.value = '';
      showApp();
    } catch (e) {
      loginError.textContent = t('login.error');
    }
  }

  document.getElementById('pin-submit').addEventListener('click', doLogin);
  pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

  function doLogout() {
    S.token = null;
    S.user = null;
    localStorage.removeItem('wo_token');
    localStorage.removeItem('wo_user');
    appShell.classList.remove('active');
    loginScreen.style.display = 'flex';

  // ---------------------------------------------------------------------
  // Generic modal form
  // ---------------------------------------------------------------------
  function openModal({ title, fields, values = {}, onSubmit }) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<h3>${esc(title)}</h3><form id="modal-form"></form>`;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

    const form = modal.querySelector('#modal-form');

    fields.forEach((f) => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      const val = values[f.name] ?? f.default ?? '';
      let inputHtml;
      if (f.type === 'select') {
        inputHtml = `<select name="${f.name}">${f.options.map((o) => `<option value="${esc(o.value)}" ${o.value === val ? 'selected' : ''}>${esc(o.label)}</option>`).join('')}</select>`;
      } else if (f.type === 'textarea') {
        inputHtml = `<textarea name="${f.name}">${esc(val)}</textarea>`;
      } else if (f.type === 'checkboxGroup') {
        const selected = Array.isArray(val) ? val : [];
        wrap.innerHTML = `<label>${esc(f.label)}</label><div class="checkbox-group">${f.options.map((o) => `
          <label><input type="checkbox" data-group="${f.name}" value="${esc(o.value)}" ${selected.includes(o.value) ? 'checked' : ''}> ${esc(o.label)}</label>`).join('')}</div>`;
        form.appendChild(wrap);
        return;
      } else {
        inputHtml = `<input type="${f.type || 'text'}" name="${f.name}" value="${esc(val)}" ${f.required ? 'required' : ''} ${f.step ? `step="${f.step}"` : ''}>`;
      }
      wrap.innerHTML = `<label>${esc(f.label)}</label>${inputHtml}`;
      form.appendChild(wrap);
    });

    if (typeof onSubmit === 'string' && onSubmit === 'lineItems') {
      // handled by caller (quotes) which injects its own line-item UI after open
    }

    const actions = document.createElement('div');
    actions.className = 'modal-actions';
    actions.innerHTML = `<button type="button" class="btn" id="modal-cancel">${t('action.cancel')}</button><button type="submit" class="btn btn-primary" id="modal-save" form="modal-form">${t('action.save')}</button>`;
    modal.appendChild(actions);

    modal.querySelector('#modal-cancel').addEventListener('click', () => overlay.remove());

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const out = {};
      fields.forEach((f) => {
        if (f.type === 'checkboxGroup') {
          out[f.name] = Array.from(form.querySelectorAll(`input[data-group="${f.name}"]:checked`)).map((i) => i.value);
        } else {
          const el = form.querySelector(`[name="${f.name}"]`);
          out[f.name] = f.type === 'number' ? Number(el.value) : el.value;
        }
      });
      try {
        await onSubmit(out, overlay, modal);
      } catch (err) {
        toast(err.message);
      }
    });

    return { overlay, modal, form };
  }

  // ---------------------------------------------------------------------
  // Generic table page (CRM, Products, Payments) — config-driven CRUD
  // ---------------------------------------------------------------------
  function renderCrudPage({ titleKey, apiPath, page, columns, fields, extraRowActions }) {
    contentEl.innerHTML = `
      <h2 class="page-title">${t(titleKey)}</h2>
      <div class="toolbar">
        <div></div>
        <button class="btn btn-primary" id="add-btn">+ ${t('action.add')}</button>
      </div>
      <div class="card"><table><thead><tr>${columns.map((c) => `<th>${esc(c.label)}</th>`).join('')}<th></th></tr></thead><tbody id="table-body"><tr class="empty-row"><td colspan="${columns.length + 1}">${t('common.loading')}</td></tr></tbody></table></div>
    `;

    async function load() {
      const list = await api(apiPath);
      S.cache[apiPath] = list;
      const tbody = document.getElementById('table-body');
      if (!tbody) return;
      if (!list.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="${columns.length + 1}">${t('common.none')}</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((item) => `
        <tr>
          ${columns.map((c) => `<td>${c.render ? c.render(item) : esc(item[c.key] ?? '')}</td>`).join('')}
          <td>
            <button class="btn btn-sm edit-btn" data-id="${item.id}">${t('action.edit')}</button>
            <button class="btn btn-sm btn-danger del-btn" data-id="${item.id}">${t('action.delete')}</button>
            ${extraRowActions ? extraRowActions(item) : ''}
          </td>
        </tr>`).join('');

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const item = list.find((x) => x.id === btn.dataset.id);
        openModal({
          title: t('action.edit'),
          fields,
          values: item,
          onSubmit: async (vals, overlay) => {
            await api(apiPath, { method: 'PUT', body: { ...vals, id: item.id } });
            overlay.remove();
            toast('Saved');
            load();
          },
        });
      }));

      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`${apiPath}?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields,
        values: {},
        onSubmit: async (vals, overlay) => {
          await api(apiPath, { method: 'POST', body: vals });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  async function renderDashboard() {
    contentEl.innerHTML = `<h2 class="page-title">${t('dashboard.title')}</h2><div class="stat-grid" id="stats"></div>`;
    const statsEl = document.getElementById('stats');
    const canCrm = canAccess(PAGES.find((p) => p.key === 'crm'));
    const canProducts = canAccess(PAGES.find((p) => p.key === 'products'));
    const canQuotes = canAccess(PAGES.find((p) => p.key === 'quotes'));

    const cards = [];
    try {
      if (canCrm) {
        const customers = await api('customers');
        cards.push({ label: t('dashboard.buyers'), value: customers.length });
      }
      if (canProducts) {
        const products = await api('products');
        cards.push({ label: t('dashboard.products'), value: products.length });
      }
      if (canQuotes) {
        const quotes = await api('quotes');
        const open = quotes.filter((q) => q.status !== 'closed');
        cards.push({ label: t('dashboard.openQuotes'), value: open.length });
        const pipelineValue = open.reduce((sum, q) => sum + (Number(q.total) || 0), 0);
        cards.push({ label: t('dashboard.pipelineValue'), value: `$${pipelineValue.toFixed(2)}` });
      }
    } catch (e) { /* ignore individual failures */ }

    statsEl.innerHTML = cards.map((c) => `<div class="stat-card"><div class="label">${esc(c.label)}</div><div class="value">${esc(c.value)}</div></div>`).join('') || `<div class="muted">${t('common.none')}</div>`;
  }

  function buildProductPayload(vals) {
    const { attrChargerType, attrVoltage, attrAmperage, attrPowerKw, attrConnectorType, attrCordLength, ...rest } = vals;
    return {
      ...rest,
      attributes: {
        chargerType: attrChargerType,

        amperage: attrAmperage,
        powerKw: attrPowerKw,
        connectorType: attrConnectorType,
        cordLength: attrCordLength,

    const a = item.attributes || {};

      ...item,

      attrVoltage: a.voltage,
      attrAmperage: a.amperage,
      attrPowerKw: a.powerKw,
      attrConnectorType: a.connectorType,

  function openQuoteModal(quote, customers) {
    const overlay = document.createElement('div');

    const lineItems = (quote && quote.lineItems && quote.lineItems.length) ? quote.lineItems.map((li) => ({ ...li })) : [{ description: '', qty: 1, unitPrice: 0 }];

          <td><input data-li="unitPrice" data-idx="${idx}" type="number" min="0" step="0.01" value="${esc(li.unitPrice ?? 0)}"></td>
          <td>${((Number(li.qty) || 0) * (Number(li.unitPrice) || 0)).toFixed(2)}</td>
          <td><button type="button" class="btn btn-sm btn-danger" data-remove-li="${idx}">✕</button></td>
        </tr>`).join('');
    }

    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `

          </div>
          <div class="field">
            <label>${t('quotes.currency')}</label>
            <select name="currency">${['USD', 'RMB', 'EUR'].map((c) => `<option value="${c}" ${quote && quote.currency === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field"><label>${t('quotes.fxNote')}</label><input name="fxNote" value="${esc(quote ? quote.fxNote : '')}" placeholder="e.g. 1 USD = 7.2 RMB, quoted in USD"></div>
        <div class="field-row">
          <div class="field"><label>${t('quotes.depositPercent')}</label><input name="depositPercent" type="number" min="0" max="100" value="${quote ? quote.depositPercent : 30}"></div>

        </div>
        ${isEdit ? `<div class="field"><label>${t('quotes.status')}</label><select name="status">${QUOTE_STATUSES.map((s) => `<option value="${s}" ${quote.status === s ? 'selected' : ''}>${esc(s.replace('_', ' '))}</option>`).join('')}</select></div>` : ''}
        <label style="font-size:12px;font-weight:600;color:var(--muted);">${t('quotes.lineItems')}</label>

  // Print links need the bearer token; open via fetch->blob since <a> can't

  window.withAuthHeaderPrint = function (id, event) {
    event.preventDefault();
    fetch(`/api/quote-print?id=${id}`, { headers: { Authorization: 'Bearer ' + S.token } })

  // ---------------------------------------------------------------------
  // Page: Scheduling — month calendar of quote/PO ready-by dates
  // ---------------------------------------------------------------------
  async function renderScheduling() {
    if (!S.schedulingMonth) {
      const now = new Date();
      S.schedulingMonth = { y: now.getFullYear(), m: now.getMonth() };
    }
    contentEl.innerHTML = `<h2 class="page-title">${t('scheduling.title')}</h2><div id="sched-container">${t('common.loading')}</div>`;

    const [quotes, pos] = await Promise.all([api('quotes').catch(() => []), api('purchase-orders').catch(() => [])]);

    function itemsForMonth(y, m) {
      const items = [];
      quotes.forEach((q) => {
        if (!q.readyByDate) return;
        const d = new Date(q.readyByDate);
        if (d.getFullYear() === y && d.getMonth() === m) items.push({ day: d.getDate(), label: `Q ${q.quoteNumber}`, type: 'quote' });
      });
      pos.forEach((po) => {
        if (!po.readyByDate) return;
        const d = new Date(po.readyByDate);
        if (d.getFullYear() === y && d.getMonth() === m) items.push({ day: d.getDate(), label: `PO ${po.poNumber}`, type: 'po' });
      });
      return items;
    }

    function renderMonth() {
      const { y, m } = S.schedulingMonth;
      const items = itemsForMonth(y, m);
      const firstDay = new Date(y, m, 1);
      const startWeekday = firstDay.getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const monthLabel = firstDay.toLocaleDateString(S.lang === 'zh' ? 'zh-CN' : 'en-US', { month: 'long', year: 'numeric' });

      const itemsByDay = {};
      items.forEach((it) => { (itemsByDay[it.day] = itemsByDay[it.day] || []).push(it); });

      let cells = '';
      for (let i = 0; i < startWeekday; i++) cells += `<div class="cal-cell empty"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const dayItems = itemsByDay[d] || [];
        cells += `<div class="cal-cell"><div class="cal-day">${d}</div>${dayItems.map((it) => `<div class="cal-chip cal-chip-${it.type}">${esc(it.label)}</div>`).join('')}</div>`;
      }

      document.getElementById('sched-container').innerHTML = `
        <div class="toolbar">
          <div>
            <button class="btn btn-sm" id="prev-month">${t('scheduling.prev')}</button>
            <strong style="margin:0 10px;">${esc(monthLabel)}</strong>
            <button class="btn btn-sm" id="next-month">${t('scheduling.next')}</button>
          </div>
          <button class="btn btn-sm" id="today-btn">${t('scheduling.today')}</button>
        </div>
        <div class="cal-grid cal-header">${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map((d) => `<div>${d}</div>`).join('')}</div>
        <div class="cal-grid">${cells}</div>
        ${!items.length ? `<div class="muted" style="margin-top:16px;">${t('scheduling.noItems')}</div>` : ''}
      `;

      document.getElementById('prev-month').addEventListener('click', () => {
        S.schedulingMonth = m === 0 ? { y: y - 1, m: 11 } : { y, m: m - 1 };
        renderMonth();
      });
      document.getElementById('next-month').addEventListener('click', () => {
        S.schedulingMonth = m === 11 ? { y: y + 1, m: 0 } : { y, m: m + 1 };
        renderMonth();
      });
      document.getElementById('today-btn').addEventListener('click', () => {
        const now = new Date();
        S.schedulingMonth = { y: now.getFullYear(), m: now.getMonth() };
        renderMonth();
      });
    }

    renderMonth();
  }

            ${e.photoDataUrl ? `<a href="${e.photoDataUrl}" target="_blank" rel="noopener" class="btn btn-sm">${t('expenses.photo')}</a>` : ''}
            ${isApprover && e.status === 'pending' ? `<button class="btn btn-sm" data-approve="${e.id}">${t('expenses.approve')}</button><button class="btn btn-sm btn-danger" data-reject="${e.id}">${t('expenses.reject')}</button>` : ''}
            <button class="btn btn-sm btn-danger del-btn" data-id="${e.id}">${t('action.delete')}</button>
          </td>
        </tr>`).join('');

      tbody.querySelectorAll('[data-approve]').forEach((btn) => btn.addEventListener('click', async () => {
        await api('expenses', { method: 'PUT', body: { id: btn.dataset.approve, status: 'approved' } });
        load();
      }));
      tbody.querySelectorAll('[data-reject]').forEach((btn) => btn.addEventListener('click', async () => {
        await api('expenses', { method: 'PUT', body: { id: btn.dataset.reject, status: 'rejected' } });
        load();
      }));
      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`expenses?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    document.getElementById('add-btn').addEventListener('click', () => openExpenseModal(fields, load));

    load();
  }

  function openExpenseModal(fields, onSaved) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<h3>${t('action.add')}</h3><form id="expense-form"></form>`;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

    const form = modal.querySelector('#expense-form');
    fields.forEach((f) => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      if (f.type === 'select') {
        wrap.innerHTML = `<label>${esc(f.label)}</label><select name="${f.name}">${f.options.map((o) => `<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('')}</select>`;
      } else {
        wrap.innerHTML = `<label>${esc(f.label)}</label><input type="${f.type || 'text'}" name="${f.name}" ${f.step ? `step="${f.step}"` : ''}>`;
      }
      form.appendChild(wrap);
    });
    const photoWrap = document.createElement('div');
    photoWrap.className = 'field';
    photoWrap.innerHTML = `<label>${t('expenses.photo')}</label><input type="file" name="photo" accept="image/*">`;
    form.appendChild(photoWrap);

    const actions = document.createElement('div');
    actions.className = 'modal-actions';
    actions.innerHTML = `<button type="button" class="btn" id="exp-cancel">${t('action.cancel')}</button><button type="submit" class="btn btn-primary" form="expense-form">${t('action.save')}</button>`;
    modal.appendChild(actions);
    modal.querySelector('#exp-cancel').addEventListener('click', () => overlay.remove());

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const out = {};
      fields.forEach((f) => { out[f.name] = f.type === 'number' ? Number(form[f.name].value) : form[f.name].value; });
      const file = form.querySelector('[name="photo"]').files[0];

      function finish(photoDataUrl) {
        api('expenses', { method: 'POST', body: { ...out, photoDataUrl } })
          .then(() => { overlay.remove(); toast('Saved'); onSaved(); })
          .catch((err) => toast(err.message));
      }

      if (file) {
        const reader = new FileReader();
        reader.onload = () => finish(reader.result);
        reader.readAsDataURL(file);
      } else {
        finish(null);
      }
    });
  }

  // ---------------------------------------------------------------------
  // Page: Tasks
  // ---------------------------------------------------------------------
  async function renderTasks() {
    const users = await api('users').catch(() => []);
    renderCrudPage({
      titleKey: 'tasks.title',
      apiPath: 'tasks',
      page: 'tasks',
      columns: [
        { key: 'title', label: t('tasks.taskTitle') },
        { key: 'assignedTo', label: t('tasks.assignedTo'), render: (i) => esc((users.find((u) => u.id === i.assignedTo) || {}).name || '—') },
        { key: 'dueDate', label: t('tasks.dueDate') },
        { key: 'status', label: t('tasks.status'), render: (i) => `<span class="badge">${esc(t('tasks.status.' + (i.status || 'open')))}</span>` },
      ],
      fields: [
        { name: 'title', label: t('tasks.taskTitle'), required: true },
        { name: 'description', label: t('tasks.description'), type: 'textarea' },
        { name: 'assignedTo', label: t('tasks.assignedTo'), type: 'select', options: users.map((u) => ({ value: u.id, label: u.name })) },
        { name: 'dueDate', label: t('tasks.dueDate'), type: 'date' },
        { name: 'status', label: t('tasks.status'), type: 'select', options: [{ value: 'open', label: t('tasks.status.open') }, { value: 'done', label: t('tasks.status.done') }] },
      ],
    });
  }

  // ---------------------------------------------------------------------
  // Page: Reports
  // ---------------------------------------------------------------------
  async function renderReports() {
    contentEl.innerHTML = `<h2 class="page-title">${t('reports.title')}</h2><div id="reports-container">${t('common.loading')}</div>`;
    const r = await api('reports');
    const container = document.getElementById('reports-container');

    function rankedList(obj) {
      const entries = Object.entries(obj || {}).sort((a, b) => b[1] - a[1]);
      if (!entries.length) return `<div class="muted">${t('reports.noData')}</div>`;
      return `<table><tbody>${entries.map(([k, v]) => `<tr><td>${esc(k)}</td><td style="text-align:right;">$${Number(v).toFixed(2)}</td></tr>`).join('')}</tbody></table>`;
    }

    container.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="label">${t('reports.openPipelineValue')}</div><div class="value">$${Number(r.openPipelineValue).toFixed(2)}</div></div>
        <div class="stat-card"><div class="label">${t('reports.openQuoteCount')}</div><div class="value">${r.openQuoteCount}</div></div>
        <div class="stat-card"><div class="label">${t('reports.pendingExpenses')}</div><div class="value">$${Number(r.pendingExpensesTotal).toFixed(2)}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;">
        <div class="card" style="padding:16px;"><h3 style="margin-top:0;font-size:14px;">${t('reports.revenueByBuyer')}</h3>${rankedList(r.revenueByBuyer)}</div>
        <div class="card" style="padding:16px;"><h3 style="margin-top:0;font-size:14px;">${t('reports.revenueByProduct')}</h3>${rankedList(r.revenueByProduct)}</div>
        <div class="card" style="padding:16px;"><h3 style="margin-top:0;font-size:14px;">${t('reports.spendBySupplier')}</h3>${rankedList(r.spendBySupplier)}</div>
        <div class="card" style="padding:16px;"><h3 style="margin-top:0;font-size:14px;">${t('reports.expensesByCategory')}</h3>${rankedList(r.expensesByCategory)}</div>
      </div>
    `;
  }

  // ---------------------------------------------------------------------
  // Page: Settings
  // ---------------------------------------------------------------------
  async function renderSettings() {
    const settings = await api('settings');
    const isAdmin = S.user.role === 'admin';
    contentEl.innerHTML = `
      <h2 class="page-title">${t('settings.title')}</h2>
      <div class="card" style="padding:20px;max-width:480px;">
        <form id="settings-form">
          <div class="field"><label>${t('settings.companyName')}</label><input name="companyName" value="${esc(settings.companyName || '')}" ${isAdmin ? '' : 'disabled'}></div>
          <div class="field"><label>${t('settings.defaultCurrency')}</label>
            <select name="defaultCurrency" ${isAdmin ? '' : 'disabled'}>${['USD', 'RMB', 'EUR'].map((c) => `<option value="${c}" ${settings.defaultCurrency === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
          </div>
          <div class="field"><label>${t('settings.notificationEmails')}</label><input name="notificationEmails" value="${esc((settings.notificationEmails || []).join(', '))}" ${isAdmin ? '' : 'disabled'}></div>
          ${isAdmin ? `<button type="submit" class="btn btn-primary">${t('action.save')}</button>` : `<div class="muted">${t('action.edit')}: admin only</div>`}
        </form>
      </div>
    `;
    if (isAdmin) {
      document.getElementById('settings-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        await api('settings', {
          method: 'PUT',
          body: {
            companyName: form.companyName.value,
            defaultCurrency: form.defaultCurrency.value,
            notificationEmails: form.notificationEmails.value.split(',').map((s) => s.trim()).filter(Boolean),
          },
        });
        toast('Saved');
      });
    }
  }

  // ---------------------------------------------------------------------
  // Page: Users & Roles (admin only)
  // ---------------------------------------------------------------------
  const ROLE_OPTIONS = [
    { value: 'admin', label: 'Admin' },
    { value: 'sales', label: 'Sales / Account Managers' },
    { value: 'procurement', label: 'Procurement / Sourcing' },
    { value: 'finance', label: 'Finance / Accounting' },
    { value: 'aftersales', label: 'After-Sales Service' },
  ];
  const PAGE_OPTIONS = [
    { value: 'crm', label: t('nav.crm') },
    { value: 'products', label: t('nav.products') },
    { value: 'quotes', label: t('nav.quotes') },
    { value: 'payments', label: t('nav.payments') },
    { value: 'procurement', label: t('nav.procurement') },
    { value: 'scheduling', label: t('nav.scheduling') },
    { value: 'expenses', label: t('nav.expenses') },
    { value: 'tasks', label: t('nav.tasks') },
    { value: 'reports', label: t('nav.reports') },
  ];

  function renderUsers() {
    contentEl.innerHTML = `
      <h2 class="page-title">${t('users.title')}</h2>
      <div class="toolbar"><div></div><button class="btn btn-primary" id="add-user-btn">+ ${t('action.add')}</button></div>
      <div class="card"><table>
        <thead><tr><th>${t('users.name')}</th><th>${t('users.role')}</th><th>${t('users.pages')}</th><th>${t('users.active')}</th><th></th></tr></thead>
        <tbody id="users-body"><tr class="empty-row"><td colspan="5">${t('common.loading')}</td></tr></tbody>
      </table></div>
    `;

    async function load() {
      const users = await api('users');
      const tbody = document.getElementById('users-body');
      tbody.innerHTML = users.map((u) => `
        <tr>
          <td>${esc(u.name)}</td>
          <td>${esc(u.role)}</td>
          <td>${(u.pages || []).map(esc).join(', ')}</td>
          <td>${u.active === false ? '✕' : '✓'}</td>
          <td>
            <button class="btn btn-sm edit-btn" data-id="${u.id}">${t('action.edit')}</button>
            <button class="btn btn-sm btn-danger del-btn" data-id="${u.id}">${t('action.delete')}</button>
          </td>
        </tr>`).join('') || `<tr class="empty-row"><td colspan="5">${t('common.none')}</td></tr>`;

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const u = users.find((x) => x.id === btn.dataset.id);
        openModal({
          title: t('action.edit'),
          fields: userFields(true),
          values: { ...u, active: u.active === false ? 'no' : 'yes' },
          onSubmit: async (vals, overlay) => {
            const body = { id: u.id, name: vals.name, role: vals.role, pages: vals.pages, active: vals.active === 'yes' };
            if (vals.pin) body.pin = vals.pin;
            await api('users', { method: 'PUT', body });
            overlay.remove();
            toast('Saved');
            load();
          },
        });
      }));
      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`users?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    function userFields(isEdit) {
      return [
        { name: 'name', label: t('users.name'), required: true },
        { name: 'role', label: t('users.role'), type: 'select', options: ROLE_OPTIONS },
        { name: 'pin', label: t('users.pin') + (isEdit ? ' (leave blank to keep)' : ''), required: !isEdit },
        { name: 'pages', label: t('users.pages'), type: 'checkboxGroup', options: PAGE_OPTIONS },
        ...(isEdit ? [{ name: 'active', label: t('users.active'), type: 'select', options: [{ value: 'yes', label: 'Yes' }, { value: 'no', label: 'No' }] }] : []),
      ];
    }

    document.getElementById('add-user-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields: userFields(false),
        values: {},
        onSubmit: async (vals, overlay) => {
          await api('users', { method: 'POST', body: vals });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  // ---------------------------------------------------------------------
  // Page: Activity Log (admin only)
  // ---------------------------------------------------------------------
  async function renderActivity() {
    contentEl.innerHTML = `<h2 class="page-title">${t('activity.title')}</h2><div class="card"><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Entity</th></tr></thead><tbody id="activity-body"></tbody></table></div>`;
    const log = await api('activity');
    document.getElementById('activity-body').innerHTML = log.map((a) => `
      <tr><td>${new Date(a.timestamp).toLocaleString()}</td><td>${esc(a.userName)}</td><td>${esc(a.action)}</td><td>${esc(a.entity)} ${esc(a.entityId || '')}</td></tr>
    `).join('') || `<tr class="empty-row"><td colspan="4">${t('common.none')}</td></tr>`;
  }

  // ---------------------------------------------------------------------
  // Router
  // ---------------------------------------------------------------------
  function renderPage() {
    const def = PAGES.find((p) => p.key === S.page);
    if (!def || !canAccess(def)) { S.page = 'dashboard'; }
    switch (S.page) {
      case 'dashboard': return renderDashboard();
      case 'crm': return renderCrm();
      case 'products': return renderProductsWrapped();
      case 'quotes': return renderQuotes();
      case 'payments': return renderPayments();
      case 'procurement': return renderProcurement();
      case 'scheduling': return renderScheduling();
      case 'expenses': return renderExpenses();
      case 'tasks': return renderTasks();
      case 'reports': return renderReports();
      case 'settings': return renderSettings();
      case 'users': return renderUsers();
      case 'activity': return renderActivity();
      default: return renderDashboard();
    }
  }

  // Wrap product CRUD to nest/flatten `attributes`.
  function renderProductsWrapped() {
    contentEl.innerHTML = `
      <h2 class="page-title">${t('products.title')}</h2>
      <div class="toolbar"><div></div><button class="btn btn-primary" id="add-btn">+ ${t('action.add')}</button></div>
      <div class="card"><table><thead><tr>
        <th>${t('products.sku')}</th><th>${t('products.name')}</th><th>${t('products.chargerType')}</th><th>${t('products.powerKw')}</th><th>${t('products.moq')}</th><th>${t('products.unitPrice')}</th><th></th>
      </tr></thead><tbody id="table-body"><tr class="empty-row"><td colspan="7">${t('common.loading')}</td></tr></tbody></table></div>
    `;

    const fields = [
      { name: 'sku', label: t('products.sku'), required: true },
      { name: 'name', label: t('products.name'), required: true },
      { name: 'category', label: t('products.category'), default: 'EV Charger' },
      { name: 'attrChargerType', label: t('products.chargerType'), type: 'select', options: [{ value: 'AC', label: 'AC' }, { value: 'DC', label: 'DC' }] },
      { name: 'attrVoltage', label: t('products.voltage') },
      { name: 'attrAmperage', label: t('products.amperage') },
      { name: 'attrPowerKw', label: t('products.powerKw') },
      { name: 'attrConnectorType', label: t('products.connectorType') },
      { name: 'attrCordLength', label: t('products.cordLength') },
      { name: 'moq', label: t('products.moq'), type: 'number' },
      { name: 'unitPriceUSD', label: t('products.unitPrice'), type: 'number', step: '0.01' },
    ];

    async function load() {
      const list = await api('products');
      const tbody = document.getElementById('table-body');
      if (!list.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="7">${t('common.none')}</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((p) => {
        const a = p.attributes || {};
        return `<tr>
          <td>${esc(p.sku)}</td><td>${esc(p.name)}</td><td>${esc(a.chargerType || '')}</td><td>${esc(a.powerKw || '')}</td><td>${esc(p.moq ?? '')}</td><td>${fmtMoney(p.unitPriceUSD, 'USD')}</td>
          <td><button class="btn btn-sm edit-btn" data-id="${p.id}">${t('action.edit')}</button> <button class="btn btn-sm btn-danger del-btn" data-id="${p.id}">${t('action.delete')}</button></td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const p = list.find((x) => x.id === btn.dataset.id);
        openModal({
          title: t('action.edit'),
          fields,
          values: flattenProduct(p),
          onSubmit: async (vals, overlay) => {
            await api('products', { method: 'PUT', body: { ...buildProductPayload(vals), id: p.id } });
            overlay.remove();
            toast('Saved');
            load();
          },
        });
      }));
      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`products?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields,
        values: {},
        onSubmit: async (vals, overlay) => {
          await api('products', { method: 'POST', body: buildProductPayload(vals) });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  // ---------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------
  applyStaticText();
  if (S.token && S.user) {
    showApp();
  }
})();
</script>
</body>
</html>
