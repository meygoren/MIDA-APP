  }

  // ---------------------------------------------------------------------
  // Page: After-Sales / Claims — batch/shipment-level defect claims, not
  // serial-number-level. Resolution (replacement/credit/refund) is
  // restricted to the After-Sales / Admin roles.
  // ---------------------------------------------------------------------
  const CLAIM_STATUSES = ['open', 'in_review', 'resolved', 'closed'];
  const CLAIM_RESOLUTIONS = ['replacement', 'credit', 'refund'];

  async function renderClaims() {
    contentEl.innerHTML = `
      <h2 class="page-title">${t('claims.title')}</h2>
      <div class="toolbar"><div></div><button class="btn btn-primary" id="add-claim-btn">+ ${t('action.add')}</button></div>
      <div class="card"><table>
        <thead><tr><th>#</th><th>${t('claims.buyer')}</th><th>${t('claims.defectiveUnits')} / ${t('claims.totalUnits')}</th><th>${t('claims.status')}</th><th></th></tr></thead>
        <tbody id="claims-body"><tr class="empty-row"><td colspan="5">${t('common.loading')}</td></tr></tbody>
      </table></div>
    `;

    const isResolver = userHasAnyRole(['admin', 'aftersales']);
    const [claims, customers, quotes, shipments] = await Promise.all([
      api('claims'),
      api('customers').catch(() => []),
      api('quotes').catch(() => []),
      api('shipments').catch(() => []),
    ]);
    const buyerName = (id) => (customers.find((c) => c.id === id) || {}).companyName || '—';

    const tbody = document.getElementById('claims-body');
    if (!claims.length) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="5">${t('common.none')}</td></tr>`;
    } else {
      tbody.innerHTML = claims.map((c) => `
        <tr>
          <td>${esc(c.claimNumber)}</td>
          <td>${esc(buyerName(c.buyerId))}</td>
          <td>${esc(c.defectiveUnits)} / ${esc(c.totalUnits)}</td>
          <td><span class="badge status-${esc(c.status)}">${esc(t('claims.status.' + c.status))}</span></td>
          <td>
            <button class="btn btn-sm view-btn" data-id="${c.id}">${t('action.edit')}</button>
            <button class="btn btn-sm btn-danger del-btn" data-id="${c.id}">${t('action.delete')}</button>
          </td>
        </tr>`).join('');
    }

    tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
      if (!confirm(t('common.confirmDelete'))) return;
      await api(`claims?id=${btn.dataset.id}`, { method: 'DELETE' });
      renderClaims();
    }));
    tbody.querySelectorAll('.view-btn').forEach((btn) => btn.addEventListener('click', () => {
      const claim = claims.find((x) => x.id === btn.dataset.id);
      openClaimModal(claim, customers, quotes, shipments, isResolver);
    }));

    document.getElementById('add-claim-btn').addEventListener('click', () => openClaimModal(null, customers, quotes, shipments, isResolver));
  }

  function openClaimModal(claim, customers, quotes, shipments, isResolver) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const isEdit = !!claim;
    const existingPhotos = (claim && claim.photoDataUrls) ? [...claim.photoDataUrls] : [];

    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <h3>${isEdit ? t('action.edit') : t('action.add')} — ${t('claims.title')}</h3>
      <form id="claim-form">
        <div class="field-row">
          <div class="field">
            <label>${t('claims.buyer')}</label>
            <select name="buyerId">${customers.map((c) => `<option value="${c.id}" ${claim && claim.buyerId === c.id ? 'selected' : ''}>${esc(c.companyName)}</option>`).join('')}</select>
          </div>
          <div class="field">
            <label>${t('claims.order')}</label>
            <select name="quoteId"><option value="">${t('claims.none')}</option>${quotes.map((q) => `<option value="${q.id}" ${claim && claim.quoteId === q.id ? 'selected' : ''}>${esc(q.quoteNumber)}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field">
          <label>${t('claims.shipment')}</label>
          <select name="shipmentId"><option value="">${t('claims.none')}</option>${shipments.map((s) => `<option value="${s.id}" ${claim && claim.shipmentId === s.id ? 'selected' : ''}>${esc(s.trackingNumber || s.id)}</option>`).join('')}</select>
        </div>
        <div class="field-row">
          <div class="field"><label>${t('claims.totalUnits')}</label><input name="totalUnits" type="number" min="0" value="${claim ? claim.totalUnits : ''}"></div>
          <div class="field"><label>${t('claims.defectiveUnits')}</label><input name="defectiveUnits" type="number" min="0" value="${claim ? claim.defectiveUnits : ''}"></div>
        </div>
        <div class="field"><label>${t('claims.description')}</label><textarea name="description">${esc(claim ? claim.description : '')}</textarea></div>
        <div class="field"><label>${t('claims.photos')}</label><input type="file" name="photos" accept="image/*" multiple></div>
        ${existingPhotos.length ? `<div class="field">${existingPhotos.map((p, i) => `<a href="${p}" target="_blank" rel="noopener" class="btn btn-sm" style="margin:2px;">${t('expenses.photo')} ${i + 1}</a>`).join('')}</div>` : ''}
        ${isEdit ? `
        <div class="field"><label>${t('claims.status')}</label>
          <select name="status" ${isResolver ? '' : 'disabled'}>${CLAIM_STATUSES.map((s) => `<option value="${s}" ${claim.status === s ? 'selected' : ''}>${esc(t('claims.status.' + s))}</option>`).join('')}</select>
        </div>
        <div class="field"><label>${t('claims.resolutionType')}</label>
          <select name="resolutionType" ${isResolver ? '' : 'disabled'}><option value="">${t('claims.none')}</option>${CLAIM_RESOLUTIONS.map((r) => `<option value="${r}" ${claim.resolutionType === r ? 'selected' : ''}>${esc(t('claims.resolution.' + r))}</option>`).join('')}</select>
        </div>
        <div class="field"><label>${t('claims.resolutionNotes')}</label><textarea name="resolutionNotes" ${isResolver ? '' : 'disabled'}>${esc(claim.resolutionNotes || '')}</textarea></div>
        ` : ''}
      </form>
      <div class="modal-actions">
        <button type="button" class="btn" id="claim-cancel">${t('action.cancel')}</button>
        <button type="submit" class="btn btn-primary" form="claim-form">${t('action.save')}</button>
      </div>
    `;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    modal.querySelector('#claim-cancel').addEventListener('click', () => overlay.remove());

    modal.querySelector('#claim-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const form = e.target;
      const files = Array.from(form.photos.files || []);

      function finish(newPhotoDataUrls) {
        const payload = {
          buyerId: form.buyerId.value,
          quoteId: form.quoteId.value || null,
          shipmentId: form.shipmentId.value || null,
          totalUnits: Number(form.totalUnits.value) || 0,
          defectiveUnits: Number(form.defectiveUnits.value) || 0,
          description: form.description.value,
          photoDataUrls: [...existingPhotos, ...newPhotoDataUrls],
        };
        if (isEdit) {
          payload.id = claim.id;
          if (isResolver) {
            payload.status = form.status.value;
            payload.resolutionType = form.resolutionType.value || null;
            payload.resolutionNotes = form.resolutionNotes.value;
          }
        }
        const request = isEdit
          ? api('claims', { method: 'PUT', body: payload })
          : api('claims', { method: 'POST', body: payload });

        request
          .then(() => { overlay.remove(); toast('Saved'); renderClaims(); })
          .catch((err) => toast(err.message));
      }

      if (files.length) {
        Promise.all(files.map((file) => new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(file);
        }))).then(finish);
      } else {
        finish([]);
      }
    });
  }

  // ---------------------------------------------------------------------
  // Page: Settings
  // ---------------------------------------------------------------------
  async function renderSettings() {
    const settings = await api('settings');
    const isAdmin = userHasRole('admin');
    contentEl.innerHTML = `
      <h2 class="page-title">${t('settings.title')}</h2>
      <div class="card" style="padding:20px;max-width:480px;margin-bottom:20px;">
        <h3 style="margin-top:0;font-size:15px;">${t('settings.myAccount')}</h3>
        <form id="pin-form">
          <div class="field"><label>${t('settings.currentPin')}</label><input name="currentPin" type="password" inputmode="numeric" autocomplete="off"></div>
          <div class="field"><label>${t('settings.newPin')}</label><input name="newPin" type="password" inputmode="numeric" autocomplete="off"></div>
          <div class="field"><label>${t('settings.confirmPin')}</label><input name="confirmPin" type="password" inputmode="numeric" autocomplete="off"></div>
          <button type="submit" class="btn btn-primary">${t('settings.changePin')}</button>
        </form>
      </div>
      <div class="card" style="padding:20px;max-width:480px;">
        <h3 style="margin-top:0;font-size:15px;">${t('settings.title')}</h3>
        <form id="settings-form">
          <div class="field"><label>${t('settings.companyName')}</label><input name="companyName" value="${esc(settings.companyName || '')}" ${isAdmin ? '' : 'disabled'}></div>
          <div class="field"><label>${t('settings.defaultCurrency')}</label>
            <select name="defaultCurrency" ${isAdmin ? '' : 'disabled'}>${['RMB', 'USD', 'EUR'].map((c) => `<option value="${c}" ${settings.defaultCurrency === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
          </div>
          <div class="field"><label>${t('settings.notificationEmails')}</label><input name="notificationEmails" value="${esc((settings.notificationEmails || []).join(', '))}" ${isAdmin ? '' : 'disabled'}></div>
          ${isAdmin ? `<button type="submit" class="btn btn-primary">${t('action.save')}</button>` : `<div class="muted">${t('action.edit')}: admin only</div>`}
        </form>
      </div>
    `;

    document.getElementById('pin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      if (form.newPin.value !== form.confirmPin.value) {
        toast(t('settings.pinMismatch'));
        return;
      }
      try {
        await api('change-pin', { method: 'POST', body: { currentPin: form.currentPin.value, newPin: form.newPin.value } });
        toast(t('settings.pinChanged'));
        form.reset();
      } catch (err) {
        toast(err.message);
      }
    });

    if (isAdmin) {
      document.getElementById('settings-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        await api('settings', {
          method: 'PUT',
          body: {
            companyName: form.companyName.value,
            defaultCurrency: form.defaultCurrency.value,
            notificationEmails: form.notificationEmails.value.split(',').map((s) => s.trim()).filter(Boolean),
          },
        });
        toast('Saved');
      });
    }
  }

  // ---------------------------------------------------------------------
  // Page: Users & Roles (admin only)
  // ---------------------------------------------------------------------
  const ROLE_OPTIONS = [
    { value: 'admin', label: 'Admin' },
    { value: 'sales', label: 'Sales / Account Managers' },
    { value: 'procurement', label: 'Procurement / Sourcing' },
    { value: 'finance', label: 'Finance / Accounting' },
    { value: 'aftersales', label: 'After-Sales Service' },
  ];
  const PAGE_OPTIONS = [
    { value: 'crm', label: t('nav.crm') },
    { value: 'products', label: t('nav.products') },
    { value: 'quotes', label: t('nav.quotes') },
    { value: 'payments', label: t('nav.payments') },
    { value: 'procurement', label: t('nav.procurement') },
    { value: 'scheduling', label: t('nav.scheduling') },
    { value: 'expenses', label: t('nav.expenses') },
    { value: 'tasks', label: t('nav.tasks') },
    { value: 'claims', label: t('nav.claims') },
    { value: 'logistics', label: t('nav.logistics') },
    { value: 'reports', label: t('nav.reports') },
  ];

  function renderUsers() {
    contentEl.innerHTML = `
      <h2 class="page-title">${t('users.title')}</h2>
      <div class="toolbar"><div></div><button class="btn btn-primary" id="add-user-btn">+ ${t('action.add')}</button></div>
      <div class="card"><table>
        <thead><tr><th>${t('users.name')}</th><th>${t('users.role')}</th><th>${t('users.pages')}</th><th>${t('users.active')}</th><th></th></tr></thead>
        <tbody id="users-body"><tr class="empty-row"><td colspan="5">${t('common.loading')}</td></tr></tbody>
      </table></div>
    `;

    async function load() {
      const users = await api('users');
      const tbody = document.getElementById('users-body');
      tbody.innerHTML = users.map((u) => `
        <tr>
          <td>${esc(u.name)}</td>
          <td>${(u.roles || []).map(esc).join(', ')}</td>
          <td>${(u.pages || []).map(esc).join(', ')}</td>
          <td>${u.active === false ? '✕' : '✓'}</td>
          <td>
            <button class="btn btn-sm edit-btn" data-id="${u.id}">${t('action.edit')}</button>
            <button class="btn btn-sm btn-danger del-btn" data-id="${u.id}">${t('action.delete')}</button>
          </td>
        </tr>`).join('') || `<tr class="empty-row"><td colspan="5">${t('common.none')}</td></tr>`;

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const u = users.find((x) => x.id === btn.dataset.id);
        openModal({
          title: t('action.edit'),
          fields: userFields(true),
          values: { ...u, active: u.active === false ? 'no' : 'yes' },
          onSubmit: async (vals, overlay) => {
            const body = { id: u.id, name: vals.name, roles: vals.roles, pages: vals.pages, active: vals.active === 'yes' };
            if (vals.pin) body.pin = vals.pin;
            await api('users', { method: 'PUT', body });
            overlay.remove();
            toast('Saved');
            load();
          },
        });
      }));
      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`users?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    function userFields(isEdit) {
      return [
        { name: 'name', label: t('users.name'), required: true },
        { name: 'roles', label: t('users.role'), type: 'checkboxGroup', options: ROLE_OPTIONS },
        { name: 'pin', label: t('users.pin') + (isEdit ? ' (leave blank to keep)' : ''), required: !isEdit },
        { name: 'pages', label: t('users.pages'), type: 'checkboxGroup', options: PAGE_OPTIONS },
        ...(isEdit ? [{ name: 'active', label: t('users.active'), type: 'select', options: [{ value: 'yes', label: 'Yes' }, { value: 'no', label: 'No' }] }] : []),
      ];
    }

    document.getElementById('add-user-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields: userFields(false),
        values: {},
        onSubmit: async (vals, overlay) => {
          await api('users', { method: 'POST', body: vals });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  // ---------------------------------------------------------------------
  // Page: Activity Log (admin only)
  // ---------------------------------------------------------------------
  async function renderActivity() {
    contentEl.innerHTML = `<h2 class="page-title">${t('activity.title')}</h2><div class="card"><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Entity</th></tr></thead><tbody id="activity-body"></tbody></table></div>`;
    const log = await api('activity');
    document.getElementById('activity-body').innerHTML = log.map((a) => `
      <tr><td>${new Date(a.timestamp).toLocaleString()}</td><td>${esc(a.userName)}</td><td>${esc(a.action)}</td><td>${esc(a.entity)} ${esc(a.entityId || '')}</td></tr>
    `).join('') || `<tr class="empty-row"><td colspan="4">${t('common.none')}</td></tr>`;
  }

  // ---------------------------------------------------------------------
  // Router
  // ---------------------------------------------------------------------
  function renderPage() {
    const def = PAGES.find((p) => p.key === S.page);
    if (!def || !canAccess(def)) { S.page = 'dashboard'; }
    switch (S.page) {
      case 'dashboard': return renderDashboard();
      case 'crm': return renderCrm();
      case 'products': return renderProductsWrapped();
      case 'quotes': return renderQuotes();
      case 'payments': return renderPayments();
      case 'procurement': return renderProcurement();
      case 'scheduling': return renderScheduling();
      case 'expenses': return renderExpenses();
      case 'tasks': return renderTasks();
      case 'claims': return renderClaims();
      case 'logistics': return renderLogistics();
      case 'reports': return renderReports();
      case 'settings': return renderSettings();
      case 'users': return renderUsers();
      case 'activity': return renderActivity();
      default: return renderDashboard();
    }
  }

  // Wrap product CRUD to nest/flatten `attributes`.
  function renderProductsWrapped() {
    contentEl.innerHTML = `
      <h2 class="page-title">${t('products.title')}</h2>
      <div class="toolbar"><div></div><button class="btn btn-primary" id="add-btn">+ ${t('action.add')}</button></div>
      <div class="list-toolbar">
        <input type="text" class="list-search" id="list-search-input" placeholder="${esc(t('common.searchPlaceholder'))}">
        <div class="pager" id="list-pager"></div>
      </div>
      <div class="card"><table><thead><tr>
        <th>${t('products.sku')}</th><th>${t('products.name')}</th><th>${t('products.chargerType')}</th><th>${t('products.powerKw')}</th><th>${t('products.moq')}</th><th>${t('products.unitPrice')}</th><th></th>
      </tr></thead><tbody id="table-body"><tr class="empty-row"><td colspan="7">${t('common.loading')}</td></tr></tbody></table></div>
    `;

    const fields = [
      { name: 'sku', label: t('products.sku'), required: true },
      { name: 'name', label: t('products.name'), required: true },
      { name: 'category', label: t('products.category'), default: 'EV Charger' },
      { name: 'attrChargerType', label: t('products.chargerType'), type: 'select', options: [{ value: 'AC', label: 'AC' }, { value: 'DC', label: 'DC' }] },
      { name: 'attrVoltage', label: t('products.voltage') },
      { name: 'attrAmperage', label: t('products.amperage') },
      { name: 'attrPowerKw', label: t('products.powerKw') },
      { name: 'attrConnectorType', label: t('products.connectorType') },
      { name: 'attrCordLength', label: t('products.cordLength') },
      { name: 'moq', label: t('products.moq'), type: 'number' },
      { name: 'unitPriceUSD', label: t('products.unitPrice'), type: 'number', step: '0.01' },
    ];

    let fullList = [];

    function renderRows(state) {
      const { pageItems, totalPages, page: p, totalFiltered } = filterAndPaginate(fullList, {
        searchTerm: state.searchTerm, searchFields: ['sku', 'name'], page: state.page,
      });
      state.page = p;
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = pageItems.length
        ? pageItems.map((p) => {
          const a = p.attributes || {};
          return `<tr>
            <td>${esc(p.sku)}</td><td>${esc(p.name)}</td><td>${esc(a.chargerType || '')}</td><td>${esc(a.powerKw || '')}</td><td>${esc(p.moq ?? '')}</td><td>${fmtMoney(p.unitPriceUSD, 'USD')}</td>
            <td><button class="btn btn-sm edit-btn" data-id="${p.id}">${t('action.edit')}</button> <button class="btn btn-sm btn-danger del-btn" data-id="${p.id}">${t('action.delete')}</button></td>
          </tr>`;
        }).join('')
        : `<tr class="empty-row"><td colspan="7">${t('common.none')}</td></tr>`;
      document.getElementById('list-pager').innerHTML = pagerHtml(p, totalPages, totalFiltered);

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const p2 = fullList.find((x) => x.id === btn.dataset.id);
        openModal({
          title: t('action.edit'),
          fields,
          values: flattenProduct(p2),
          onSubmit: async (vals, overlay) => {
            await api('products', { method: 'PUT', body: { ...buildProductPayload(vals), id: p2.id } });
            overlay.remove();
            toast('Saved');
            load();
          },
        });
      }));
      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`products?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    const toolbarState = bindListToolbar({ searchInputId: 'list-search-input', pagerId: 'list-pager', onChange: renderRows });

    async function load() {
      fullList = await api('products');
      toolbarState.page = 1;
      renderRows(toolbarState);
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields,
        values: {},
        onSubmit: async (vals, overlay) => {
          await api('products', { method: 'POST', body: buildProductPayload(vals) });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  // ---------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------
  applyStaticText();
  if (S.token && S.user) {
    showApp();
  }
})();
</script>
</body>
</html>
