<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wholesale Ops</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1a1d23;
    --muted: #6b7280;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --danger: #dc2626;
    --success: #16a34a;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }

  /* Login */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 320px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .login-box h1 { font-size: 20px; margin: 0 0 24px; }
  .login-box input { width: 100%; padding: 12px; font-size: 20px; text-align: center; letter-spacing: 4px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; }
  .login-box button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; }
  .login-box button:hover { background: var(--primary-dark); }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 18px; }

  /* Shell */
  #app-shell { display: none; min-height: 100vh; }
  #app-shell.active { display: flex; }
  #sidebar { width: 220px; background: #14181f; color: #cbd5e1; flex-shrink: 0; display: flex; flex-direction: column; }
  #sidebar .brand { padding: 20px 16px; font-weight: 700; color: #fff; font-size: 16px; border-bottom: 1px solid #262c36; }
  #sidebar nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  #sidebar nav a { display: block; padding: 10px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; cursor: pointer; }
  #sidebar nav a:hover { background: #1e2530; color: #fff; }
  #sidebar nav a.active { background: var(--primary); color: #fff; }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar { height: 56px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; padding: 0 24px; gap: 16px; }
  #topbar .user-name { font-size: 14px; color: var(--muted); }
  #topbar button, #topbar select { padding: 6px 10px; border: 1px solid var(--border); background: #fff; border-radius: 6px; font-size: 13px; }
  #content { flex: 1; padding: 24px; overflow-y: auto; }

  h2.page-title { margin: 0 0 20px; font-size: 20px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: #fff; font-size: 13px; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-danger { color: var(--danger); }
  .btn-sm { padding: 4px 8px; font-size: 12px; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: #fafbfc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; }
  tr:last-child td { border-bottom: none; }
  .empty-row td { text-align: center; color: var(--muted); padding: 32px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; background: #eef2ff; color: #4338ca; }
  .badge.status-draft { background: #f3f4f6; color: #4b5563; }
  .badge.status-sent { background: #dbeafe; color: #1e40af; }
  .badge.status-accepted, .badge.status-deposit_paid { background: #fef3c7; color: #92400e; }
  .badge.status-in_production { background: #ede9fe; color: #5b21b6; }
  .badge.status-balance_paid, .badge.status-shipped { background: #d1fae5; color: #065f46; }
  .badge.status-closed { background: #e5e7eb; color: #374151; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; }
  .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: #fff; border-radius: var(--radius); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 24px; }
  .modal h3 { margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; }
  .field textarea { min-height: 70px; resize: vertical; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkbox-group label { font-weight: 400; display: flex; align-items: center; gap: 6px; margin-bottom: 6px; color: var(--text); font-size: 13px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  .line-items-table { width: 100%; margin-bottom: 8px; }
  .line-items-table th, .line-items-table td { padding: 6px; font-size: 12px; }
  .line-items-table input { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 4px; }
  .wa-link { color: var(--success); text-decoration: none; font-size: 12px; }
  .wa-link:hover { text-decoration: underline; }
  .muted { color: var(--muted); }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1d23; color: #fff; padding: 12px 18px; border-radius: 6px; font-size: 13px; z-index: 200; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1 id="login-title">Wholesale Ops Login</h1>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="8" placeholder="PIN">
    <button id="pin-submit">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app-shell">
  <div id="sidebar">
    <div class="brand">Wholesale Ops</div>
    <nav id="nav-links"></nav>
  </div>
  <div id="main">
    <div id="topbar">
      <select id="lang-toggle">
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
      <span class="user-name" id="topbar-user"></span>
      <button id="logout-btn">Logout</button>
    </div>
    <div id="content"></div>
  </div>
</div>

      'settings.defaultCurrency': '默认货币',
      'settings.notificationEmails': '通知邮箱 (逗号分隔)',
      'users.title': '用户与角色',
      'users.name': '姓名',
      'users.role': '角色',
      'users.pin': 'PIN 码',
      'users.pages': '页面权限',
      'users.active': '启用',
      'activity.title': '操作日志',
    },
  };

  function t(key) {
    const lang = S.lang;
    return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || (TRANSLATIONS.en[key]) || key;
  }

  // ---------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------
  const S = {
    token: localStorage.getItem('wo_token') || null,
    user: JSON.parse(localStorage.getItem('wo_user') || 'null'),
    lang: localStorage.getItem('wo_lang') || 'en',
    page: 'dashboard',
    cache: {},
  };

  const PAGES = [
    { key: 'dashboard', labelKey: 'nav.dashboard', page: null },
    { key: 'crm', labelKey: 'nav.crm', page: 'crm' },
    { key: 'products', labelKey: 'nav.products', page: 'products' },
    { key: 'quotes', labelKey: 'nav.quotes', page: 'quotes' },
    { key: 'payments', labelKey: 'nav.payments', page: 'payments' },
    { key: 'settings', labelKey: 'nav.settings', page: null },
    { key: 'users', labelKey: 'nav.users', adminOnly: true },
    { key: 'activity', labelKey: 'nav.activity', adminOnly: true },
  ];

  function canAccess(pageDef) {
    if (!S.user) return false;
    if (S.user.role === 'admin') return true;
    if (pageDef.adminOnly) return false;
    if (!pageDef.page) return true;
    return (S.user.pages || []).includes(pageDef.page);
  }

  // ---------------------------------------------------------------------
  // API helper
  // ---------------------------------------------------------------------
  async function api(path, { method = 'GET', body } = {}) {
    const res = await fetch('/api/' + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(S.token ? { Authorization: 'Bearer ' + S.token } : {}),
      },
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    if (res.status === 401) {
      doLogout();
      throw new Error('Unauthorized');
    }
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function fmtMoney(n, currency) {
    return `${currency || 'USD'} ${Number(n || 0).toFixed(2)}`;
  }

  function waLink(phone, text) {
    const digits = String(phone || '').replace(/[^\d]/g, '');
    if (!digits) return null;
    const q = text ? `?text=${encodeURIComponent(text)}` : '';
    return `https://wa.me/${digits}${q}`;
  }

  // ---------------------------------------------------------------------
  // Login
  // ---------------------------------------------------------------------
  const loginScreen = document.getElementById('login-screen');
  const appShell = document.getElementById('app-shell');
  const pinInput = document.getElementById('pin-input');
  const loginError = document.getElementById('login-error');

  async function doLogin() {
    loginError.textContent = '';
    const pin = pinInput.value.trim();
    if (!pin) return;
    try {
      const data = await api('auth', { method: 'POST', body: { pin } });
      S.token = data.token;
      S.user = data.user;
      localStorage.setItem('wo_token', S.token);
      localStorage.setItem('wo_user', JSON.stringify(S.user));
      pinInput.value = '';
      showApp();
    } catch (e) {
      loginError.textContent = t('login.error');
    }
  }

  document.getElementById('pin-submit').addEventListener('click', doLogin);
  pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

  function doLogout() {
    S.token = null;
    S.user = null;
    localStorage.removeItem('wo_token');
    localStorage.removeItem('wo_user');
    appShell.classList.remove('active');
    loginScreen.style.display = 'flex';
  }
  document.getElementById('logout-btn').addEventListener('click', doLogout);

  // ---------------------------------------------------------------------
  // Shell / nav
  // ---------------------------------------------------------------------
  const navLinks = document.getElementById('nav-links');
  const contentEl = document.getElementById('content');
  const langToggle = document.getElementById('lang-toggle');

  function renderNav() {
    navLinks.innerHTML = '';
    PAGES.filter(canAccess).forEach((p) => {
      const a = document.createElement('a');
      a.textContent = t(p.labelKey);
      a.className = p.key === S.page ? 'active' : '';
      a.addEventListener('click', () => navigate(p.key));
      navLinks.appendChild(a);
    });
  }

  function applyStaticText() {
    document.getElementById('login-title').textContent = t('login.title');
    document.getElementById('pin-submit').textContent = t('login.submit');
    document.getElementById('topbar-user').textContent = S.user ? `${S.user.name} (${S.user.role})` : '';
    document.getElementById('logout-btn').textContent = t('action.logout');
    langToggle.value = S.lang;
  }

  langToggle.addEventListener('change', () => {
    S.lang = langToggle.value;
    localStorage.setItem('wo_lang', S.lang);
    applyStaticText();
    renderNav();
    renderPage();
  });

  function navigate(key) {
    S.page = key;
    renderNav();
    renderPage();
  }

  function showApp() {
    loginScreen.style.display = 'none';
    appShell.classList.add('active');
    applyStaticText();
    renderNav();
    renderPage();
  }

  // ---------------------------------------------------------------------
  // Generic modal form
  // ---------------------------------------------------------------------
  function openModal({ title, fields, values = {}, onSubmit }) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<h3>${esc(title)}</h3><form id="modal-form"></form>`;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

    const form = modal.querySelector('#modal-form');

    fields.forEach((f) => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      const val = values[f.name] ?? f.default ?? '';
      let inputHtml;
      if (f.type === 'select') {
        inputHtml = `<select name="${f.name}">${f.options.map((o) => `<option value="${esc(o.value)}" ${o.value === val ? 'selected' : ''}>${esc(o.label)}</option>`).join('')}</select>`;
      } else if (f.type === 'textarea') {
        inputHtml = `<textarea name="${f.name}">${esc(val)}</textarea>`;
      } else if (f.type === 'checkboxGroup') {
        const selected = Array.isArray(val) ? val : [];
        wrap.innerHTML = `<label>${esc(f.label)}</label><div class="checkbox-group">${f.options.map((o) => `
          <label><input type="checkbox" data-group="${f.name}" value="${esc(o.value)}" ${selected.includes(o.value) ? 'checked' : ''}> ${esc(o.label)}</label>`).join('')}</div>`;
        form.appendChild(wrap);
        return;
      } else {
        inputHtml = `<input type="${f.type || 'text'}" name="${f.name}" value="${esc(val)}" ${f.required ? 'required' : ''} ${f.step ? `step="${f.step}"` : ''}>`;
      }
      wrap.innerHTML = `<label>${esc(f.label)}</label>${inputHtml}`;
      form.appendChild(wrap);
    });

    if (typeof onSubmit === 'string' && onSubmit === 'lineItems') {
      // handled by caller (quotes) which injects its own line-item UI after open
    }

    const actions = document.createElement('div');
    actions.className = 'modal-actions';
    actions.innerHTML = `<button type="button" class="btn" id="modal-cancel">${t('action.cancel')}</button><button type="submit" class="btn btn-primary" id="modal-save" form="modal-form">${t('action.save')}</button>`;
    modal.appendChild(actions);

    modal.querySelector('#modal-cancel').addEventListener('click', () => overlay.remove());

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const out = {};
      fields.forEach((f) => {
        if (f.type === 'checkboxGroup') {
          out[f.name] = Array.from(form.querySelectorAll(`input[data-group="${f.name}"]:checked`)).map((i) => i.value);
        } else {
          const el = form.querySelector(`[name="${f.name}"]`);
          out[f.name] = f.type === 'number' ? Number(el.value) : el.value;
        }
      });
      try {
        await onSubmit(out, overlay, modal);
      } catch (err) {
        toast(err.message);
      }
    });

    return { overlay, modal, form };
  }

  // Generic table page (CRM, Products, Payments) — config-driven CRUD
  // ---------------------------------------------------------------------
  function renderCrudPage({ titleKey, apiPath, page, columns, fields, extraRowActions }) {
    contentEl.innerHTML = `
      <h2 class="page-title">${t(titleKey)}</h2>
      <div class="toolbar">
        <div></div>
        <button class="btn btn-primary" id="add-btn">+ ${t('action.add')}</button>
      </div>
      <div class="card"><table><thead><tr>${columns.map((c) => `<th>${esc(c.label)}</th>`).join('')}<th></th></tr></thead><tbody id="table-body"><tr class="empty-row"><td colspan="${columns.length + 1}">${t('common.loading')}</td></tr></tbody></table></div>
    `;

    async function load() {
      const list = await api(apiPath);
      S.cache[apiPath] = list;
      const tbody = document.getElementById('table-body');
      if (!tbody) return;
      if (!list.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="${columns.length + 1}">${t('common.none')}</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((item) => `
        <tr>
          ${columns.map((c) => `<td>${c.render ? c.render(item) : esc(item[c.key] ?? '')}</td>`).join('')}
          <td>
            <button class="btn btn-sm edit-btn" data-id="${item.id}">${t('action.edit')}</button>
            <button class="btn btn-sm btn-danger del-btn" data-id="${item.id}">${t('action.delete')}</button>
            ${extraRowActions ? extraRowActions(item) : ''}
          </td>
        </tr>`).join('');

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const item = list.find((x) => x.id === btn.dataset.id);
        openModal({
          title: t('action.edit'),
          fields,
          values: item,
          onSubmit: async (vals, overlay) => {
            await api(apiPath, { method: 'PUT', body: { ...vals, id: item.id } });
            overlay.remove();
            toast('Saved');
            load();
          },
        });
      }));

      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`${apiPath}?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields,
        values: {},
        onSubmit: async (vals, overlay) => {
          await api(apiPath, { method: 'POST', body: vals });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  async function renderDashboard() {
    contentEl.innerHTML = `<h2 class="page-title">${t('dashboard.title')}</h2><div class="stat-grid" id="stats"></div>`;
    const statsEl = document.getElementById('stats');
    const canCrm = canAccess(PAGES.find((p) => p.key === 'crm'));
    const canProducts = canAccess(PAGES.find((p) => p.key === 'products'));
    const canQuotes = canAccess(PAGES.find((p) => p.key === 'quotes'));

    const cards = [];
    try {
      if (canCrm) {
        const customers = await api('customers');
        cards.push({ label: t('dashboard.buyers'), value: customers.length });
      }
      if (canProducts) {
        const products = await api('products');
        cards.push({ label: t('dashboard.products'), value: products.length });
      }
      if (canQuotes) {
        const quotes = await api('quotes');
        const open = quotes.filter((q) => q.status !== 'closed');
        cards.push({ label: t('dashboard.openQuotes'), value: open.length });
        const pipelineValue = open.reduce((sum, q) => sum + (Number(q.total) || 0), 0);
        cards.push({ label: t('dashboard.pipelineValue'), value: `$${pipelineValue.toFixed(2)}` });
      }
    } catch (e) { /* ignore individual failures */ }

    statsEl.innerHTML = cards.map((c) => `<div class="stat-card"><div class="label">${esc(c.label)}</div><div class="value">${esc(c.value)}</div></div>`).join('') || `<div class="muted">${t('common.none')}</div>`;

  function buildProductPayload(vals) {
    const { attrChargerType, attrVoltage, attrAmperage, attrPowerKw, attrConnectorType, attrCordLength, ...rest } = vals;
    return {
      ...rest,
      attributes: {
        chargerType: attrChargerType,

        amperage: attrAmperage,
        powerKw: attrPowerKw,
        connectorType: attrConnectorType,
        cordLength: attrCordLength,
      },
    };
  }

  function flattenProduct(item) {
    const a = item.attributes || {};
    return {
      ...item,
      attrChargerType: a.chargerType,
      attrVoltage: a.voltage,
      attrAmperage: a.amperage,
      attrPowerKw: a.powerKw,
      attrConnectorType: a.connectorType,
      attrCordLength: a.cordLength,
    };
  }

  function openQuoteModal(quote, customers) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const isEdit = !!quote;
    const lineItems = (quote && quote.lineItems && quote.lineItems.length) ? quote.lineItems.map((li) => ({ ...li })) : [{ description: '', qty: 1, unitPrice: 0 }];

    function lineItemsRowsHtml() {
      return lineItems.map((li, idx) => `
        <tr>
          <td><input data-li="description" data-idx="${idx}" value="${esc(li.description || '')}"></td>
          <td><input data-li="qty" data-idx="${idx}" type="number" min="0" value="${esc(li.qty ?? 1)}"></td>
          <td><input data-li="unitPrice" data-idx="${idx}" type="number" min="0" step="0.01" value="${esc(li.unitPrice ?? 0)}"></td>
          <td>${((Number(li.qty) || 0) * (Number(li.unitPrice) || 0)).toFixed(2)}</td>
          <td><button type="button" class="btn btn-sm btn-danger" data-remove-li="${idx}">✕</button></td>
        </tr>`).join('');
    }

    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <h3>${isEdit ? t('action.edit') : t('action.add')} — ${t('quotes.title')}</h3>
      <form id="quote-form">
        <div class="field-row">
          <div class="field">
            <label>${t('quotes.buyer')}</label>
            <select name="buyerId">${customers.map((c) => `<option value="${c.id}" ${quote && quote.buyerId === c.id ? 'selected' : ''}>${esc(c.companyName)}</option>`).join('')}</select>
          </div>
          <div class="field">
            <label>${t('quotes.currency')}</label>
            <select name="currency">${['USD', 'RMB', 'EUR'].map((c) => `<option value="${c}" ${quote && quote.currency === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field"><label>${t('quotes.fxNote')}</label><input name="fxNote" value="${esc(quote ? quote.fxNote : '')}" placeholder="e.g. 1 USD = 7.2 RMB, quoted in USD"></div>
        <div class="field-row">
          <div class="field"><label>${t('quotes.depositPercent')}</label><input name="depositPercent" type="number" min="0" max="100" value="${quote ? quote.depositPercent : 30}"></div>
          <div class="field"><label>${t('quotes.readyBy')}</label><input name="readyByDate" type="date" value="${quote && quote.readyByDate ? quote.readyByDate : ''}"></div>
        </div>
        ${isEdit ? `<div class="field"><label>${t('quotes.status')}</label><select name="status">${QUOTE_STATUSES.map((s) => `<option value="${s}" ${quote.status === s ? 'selected' : ''}>${esc(s.replace('_', ' '))}</option>`).join('')}</select></div>` : ''}
        <label style="font-size:12px;font-weight:600;color:var(--muted);">${t('quotes.lineItems')}</label>
        <table class="line-items-table">
          <thead><tr><th>${t('quotes.description')}</th><th>${t('quotes.qty')}</th><th>${t('quotes.unitPrice')}</th><th>${t('quotes.lineTotal')}</th><th></th></tr></thead>
          <tbody id="li-body">${lineItemsRowsHtml()}</tbody>
        </table>
        <button type="button" class="btn btn-sm" id="add-line-btn">${t('quotes.addLine')}</button>
        <div class="field" style="margin-top:14px;"><label>${t('quotes.notes')}</label><textarea name="notes">${esc(quote ? quote.notes : '')}</textarea></div>
      </form>
      <div class="modal-actions">
        <button type="button" class="btn" id="quote-cancel">${t('action.cancel')}</button>
        <button type="submit" class="btn btn-primary" form="quote-form">${t('action.save')}</button>
      </div>
    `;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    modal.querySelector('#quote-cancel').addEventListener('click', () => overlay.remove());

    function refreshLiBody() {
      modal.querySelector('#li-body').innerHTML = lineItemsRowsHtml();
      bindLiInputs();
    }

    function bindLiInputs() {
      modal.querySelectorAll('[data-li]').forEach((input) => {
        input.addEventListener('input', () => {
          const idx = Number(input.dataset.idx);
          const field = input.dataset.li;
          lineItems[idx][field] = field === 'description' ? input.value : Number(input.value);
          refreshLiBody();
        });
      });
      modal.querySelectorAll('[data-remove-li]').forEach((btn) => {
        btn.addEventListener('click', () => {
          lineItems.splice(Number(btn.dataset.removeLi), 1);
          if (!lineItems.length) lineItems.push({ description: '', qty: 1, unitPrice: 0 });
          refreshLiBody();
        });
      });
    }
    bindLiInputs();

    modal.querySelector('#add-line-btn').addEventListener('click', () => {
      lineItems.push({ description: '', qty: 1, unitPrice: 0 });
      refreshLiBody();
    });

    modal.querySelector('#quote-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const payload = {
        buyerId: form.buyerId.value,
        currency: form.currency.value,
        fxNote: form.fxNote.value,
        depositPercent: Number(form.depositPercent.value) || 0,
        readyByDate: form.readyByDate.value || null,
        notes: form.notes.value,
        lineItems,
      };
      if (isEdit) {
        payload.id = quote.id;
        if (form.status) payload.status = form.status.value;
        await api('quotes', { method: 'PUT', body: payload });
      } else {
        await api('quotes', { method: 'POST', body: payload });
      }
      overlay.remove();
      toast('Saved');
      renderQuotes();
    });
  }

  // Print links need the bearer token; open via fetch->blob since <a> can't
  // carry an Authorization header.
  window.withAuthHeaderPrint = function (id, event) {
    event.preventDefault();
    fetch(`/api/quote-print?id=${id}`, { headers: { Authorization: 'Bearer ' + S.token } })
      .then((r) => r.text())
      .then((html) => {
        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
      });
    return false;
  };

      openModal({
        title: t('action.add'),
        fields: userFields(false),
        values: {},
        onSubmit: async (vals, overlay) => {
          await api('users', { method: 'POST', body: vals });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  // ---------------------------------------------------------------------
  // Page: Activity Log (admin only)
  // ---------------------------------------------------------------------
  async function renderActivity() {
    contentEl.innerHTML = `<h2 class="page-title">${t('activity.title')}</h2><div class="card"><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Entity</th></tr></thead><tbody id="activity-body"></tbody></table></div>`;
    const log = await api('activity');
    document.getElementById('activity-body').innerHTML = log.map((a) => `
      <tr><td>${new Date(a.timestamp).toLocaleString()}</td><td>${esc(a.userName)}</td><td>${esc(a.action)}</td><td>${esc(a.entity)} ${esc(a.entityId || '')}</td></tr>
    `).join('') || `<tr class="empty-row"><td colspan="4">${t('common.none')}</td></tr>`;
  }

  // ---------------------------------------------------------------------
  // Router
  // ---------------------------------------------------------------------
  function renderPage() {
    const def = PAGES.find((p) => p.key === S.page);
    if (!def || !canAccess(def)) { S.page = 'dashboard'; }
    switch (S.page) {
      case 'dashboard': return renderDashboard();
      case 'crm': return renderCrm();
      case 'products': return renderProductsWrapped();
      case 'quotes': return renderQuotes();
      case 'payments': return renderPayments();
      case 'settings': return renderSettings();
      case 'users': return renderUsers();
      case 'activity': return renderActivity();
      default: return renderDashboard();
    }
  }

  // Wrap product CRUD to nest/flatten `attributes`.
  function renderProductsWrapped() {
    contentEl.innerHTML = `
      <h2 class="page-title">${t('products.title')}</h2>
      <div class="toolbar"><div></div><button class="btn btn-primary" id="add-btn">+ ${t('action.add')}</button></div>
      <div class="card"><table><thead><tr>
        <th>${t('products.sku')}</th><th>${t('products.name')}</th><th>${t('products.chargerType')}</th><th>${t('products.powerKw')}</th><th>${t('products.moq')}</th><th>${t('products.unitPrice')}</th><th></th>
      </tr></thead><tbody id="table-body"><tr class="empty-row"><td colspan="7">${t('common.loading')}</td></tr></tbody></table></div>
    `;

    const fields = [
      { name: 'sku', label: t('products.sku'), required: true },
      { name: 'name', label: t('products.name'), required: true },
      { name: 'category', label: t('products.category'), default: 'EV Charger' },
      { name: 'attrChargerType', label: t('products.chargerType'), type: 'select', options: [{ value: 'AC', label: 'AC' }, { value: 'DC', label: 'DC' }] },
      { name: 'attrVoltage', label: t('products.voltage') },
      { name: 'attrAmperage', label: t('products.amperage') },
      { name: 'attrPowerKw', label: t('products.powerKw') },
      { name: 'attrConnectorType', label: t('products.connectorType') },
      { name: 'attrCordLength', label: t('products.cordLength') },
      { name: 'moq', label: t('products.moq'), type: 'number' },
      { name: 'unitPriceUSD', label: t('products.unitPrice'), type: 'number', step: '0.01' },
    ];

    async function load() {
      const list = await api('products');
      const tbody = document.getElementById('table-body');
      if (!list.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="7">${t('common.none')}</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((p) => {
        const a = p.attributes || {};
        return `<tr>
          <td>${esc(p.sku)}</td><td>${esc(p.name)}</td><td>${esc(a.chargerType || '')}</td><td>${esc(a.powerKw || '')}</td><td>${esc(p.moq ?? '')}</td><td>${fmtMoney(p.unitPriceUSD, 'USD')}</td>
          <td><button class="btn btn-sm edit-btn" data-id="${p.id}">${t('action.edit')}</button> <button class="btn btn-sm btn-danger del-btn" data-id="${p.id}">${t('action.delete')}</button></td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const p = list.find((x) => x.id === btn.dataset.id);
        openModal({
          title: t('action.edit'),
          fields,
          values: flattenProduct(p),
          onSubmit: async (vals, overlay) => {
            await api('products', { method: 'PUT', body: { ...buildProductPayload(vals), id: p.id } });
            overlay.remove();
            toast('Saved');
            load();
          },
        });
      }));
      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`products?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields,
        values: {},
        onSubmit: async (vals, overlay) => {
          await api('products', { method: 'POST', body: buildProductPayload(vals) });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  // ---------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------
  applyStaticText();
  if (S.token && S.user) {
    showApp();
  }
})();
</script>
</body>
</html>
