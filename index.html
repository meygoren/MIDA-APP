<!doctype html>
<html lang="en">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wholesale Ops</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1a1d23;
    --muted: #6b7280;
    /* MIDA brand palette, sampled from the company logo (blue swirl + lime-green swirl) */
    --brand-blue: #1668b8;
    --brand-blue-dark: #0d4c8c;
    --brand-navy: #0a2e4d;
    --brand-green: #8dc63f;
    --brand-green-dark: #6fa82e;
    --primary: var(--brand-blue);
    --primary-dark: var(--brand-blue-dark);
    --danger: #dc2626;
    --success: var(--brand-green-dark);
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }

  /* Login */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 320px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .login-box .brand-mark { justify-content: center; margin-bottom: 20px; }
  .login-box h1 { font-size: 18px; margin: 0 0 24px; color: var(--muted); font-weight: 600; }
  .login-box input { width: 100%; padding: 12px; font-size: 20px; text-align: center; letter-spacing: 4px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; }
  .login-box button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; }
  .login-box button:hover { background: var(--primary-dark); }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 18px; }

  /* Brand mark (styled placeholder until the real logo asset is embedded) */
  .brand-mark { display: flex; align-items: center; gap: 10px; }
  .brand-mark .swirl { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; background: conic-gradient(from 200deg, var(--brand-blue) 0deg, var(--brand-blue) 150deg, var(--brand-green) 160deg, var(--brand-green) 340deg, var(--brand-blue) 360deg); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.15); }
  .brand-mark .wordmark { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
  .brand-mark .wordmark .m, .brand-mark .wordmark .d, .brand-mark .wordmark .a { color: var(--brand-blue); }
  .brand-mark .wordmark .i { color: var(--brand-green); }
  #sidebar .brand-mark .wordmark .m, #sidebar .brand-mark .wordmark .d, #sidebar .brand-mark .wordmark .a { color: #fff; }
  #sidebar .brand-mark .wordmark .i { color: var(--brand-green); }

  /* Shell: off-canvas sidebar so content is always full width, mobile-friendly */
  #app-shell { display: none; min-height: 100vh; }
  #app-shell.active { display: block; }
  #sidebar-toggle { position: fixed; top: 12px; left: 12px; z-index: 120; width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); font-size: 18px; line-height: 1; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  #sidebar-overlay.open { opacity: 1; pointer-events: auto; }
  #sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 240px; background: var(--brand-navy); color: #cbd5e1; flex-shrink: 0; display: flex; flex-direction: column; z-index: 110; transform: translateX(-100%); transition: transform 0.2s ease; }
  #sidebar.open { transform: translateX(0); }
  #sidebar .brand { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  #sidebar nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  #sidebar nav a { display: block; padding: 10px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; cursor: pointer; }
  #sidebar nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
  #sidebar nav a.active { background: var(--brand-blue); color: #fff; }
  #main { display: flex; flex-direction: column; min-width: 0; width: 100%; }
  #topbar { height: 56px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; padding: 0 24px 0 64px; gap: 16px; }
  #topbar .user-name { font-size: 14px; color: var(--muted); }
  #topbar button, #topbar select { padding: 6px 10px; border: 1px solid var(--border); background: #fff; border-radius: 6px; font-size: 13px; }
  #content { padding: 24px; }
  @media (max-width: 640px) {
    #topbar { padding-left: 60px; flex-wrap: wrap; height: auto; padding-top: 10px; padding-bottom: 10px; }
    #content { padding: 16px; }
  }

  /* Notifications */
  #notif-wrap { position: relative; margin-right: auto; }
  #notif-bell { position: relative; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: #fff; border-radius: 8px; color: var(--text); padding: 0; }
  #notif-badge { position: absolute; top: -5px; right: -5px; min-width: 16px; height: 16px; padding: 0 3px; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; line-height: 16px; text-align: center; border-radius: 999px; display: none; }
  #notif-badge.show { display: block; }
  #notif-dropdown { position: absolute; top: 46px; left: 0; width: 300px; max-height: 360px; overflow-y: auto; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.14); z-index: 150; display: none; }
  #notif-dropdown.open { display: block; }
  .notif-header { padding: 10px 14px; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; }
  .notif-item:last-child { border-bottom: none; }
  .notif-item:hover { background: var(--bg); }
  .notif-item .notif-item-title { font-weight: 600; }
  .notif-item .notif-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .notif-empty { padding: 24px 14px; text-align: center; color: var(--muted); font-size: 13px; }

  h2.page-title { margin: 0 0 20px; font-size: 20px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .list-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
  .list-search { flex: 1; min-width: 180px; max-width: 320px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
  .pager { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
  .pager-page { font-variant-numeric: tabular-nums; min-width: 44px; text-align: center; }
  .view-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: #fff; font-size: 13px; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-danger { color: var(--danger); }
  .btn-sm { padding: 4px 8px; font-size: 12px; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: #fafbfc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; }
  tr:last-child td { border-bottom: none; }
  .empty-row td { text-align: center; color: var(--muted); padding: 32px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; background: #eef2ff; color: #4338ca; }
  .badge.status-draft { background: #f3f4f6; color: #4b5563; }
  .badge.status-sent { background: #dbeafe; color: #1e40af; }
  .badge.status-accepted, .badge.status-deposit_paid { background: #fef3c7; color: #92400e; }
  .badge.status-in_production { background: #ede9fe; color: #5b21b6; }
  .badge.status-balance_paid, .badge.status-shipped { background: #d1fae5; color: #065f46; }
  .badge.status-closed { background: #e5e7eb; color: #374151; }
  .badge.status-open { background: #fee2e2; color: #991b1b; }
  .badge.status-in_review { background: #fef3c7; color: #92400e; }
  .badge.status-resolved { background: #d1fae5; color: #065f46; }
  .badge.status-booked { background: #eef2ff; color: #4338ca; }
  .badge.status-in_transit { background: #dbeafe; color: #1e40af; }
  .badge.status-customs { background: #fef3c7; color: #92400e; }
  .badge.status-delivered { background: #d1fae5; color: #065f46; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; }
  .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: #fff; border-radius: var(--radius); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 24px; }
  .modal h3 { margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; }
  .field textarea { min-height: 70px; resize: vertical; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  /* display:block (not flex) so long labels wrap normally instead of
     overflowing the modal on narrow/mobile viewports — a bare text node as
     a flex sibling of the checkbox won't reliably wrap in all browsers. */
  .checkbox-group label { font-weight: 400; display: block; margin-bottom: 8px; color: var(--text); font-size: 13px; line-height: 1.4; }
  .checkbox-group label input[type="checkbox"] { margin-right: 7px; vertical-align: middle; position: relative; top: -1px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  .line-items-table { width: 100%; margin-bottom: 8px; }
  .line-items-table th, .line-items-table td { padding: 6px; font-size: 12px; }
  .line-items-table input { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 4px; }
  .wa-link { color: var(--success); text-decoration: none; font-size: 12px; }
  .wa-link:hover { text-decoration: underline; }
  .muted { color: var(--muted); }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1d23; color: #fff; padding: 12px 18px; border-radius: 6px; font-size: 13px; z-index: 200; }

  /* Calendar (Scheduling) */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-header { margin-bottom: 4px; font-size: 11px; text-transform: uppercase; color: var(--muted); text-align: center; }
  .cal-cell { min-height: 72px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 4px; font-size: 11px; }
  .cal-cell.empty { background: transparent; border: none; }
  .cal-day { font-weight: 600; margin-bottom: 4px; }
  .cal-chip { background: #eef2ff; color: #4338ca; border-radius: 4px; padding: 2px 4px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-chip-po { background: #fef3c7; color: #92400e; }
  @media (max-width: 640px) {
    .cal-cell { min-height: 48px; font-size: 10px; }
  }
</style>
</head>

<div id="login-screen">

    <h1 id="login-title">Wholesale Ops Login</h1>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="8" placeholder="PIN">

    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app-shell">

  <div id="sidebar-overlay"></div>
  <div id="sidebar">

    <nav id="nav-links"></nav>
  </div>
  <div id="main">
    <div id="topbar">
      <div id="notif-wrap">
        <button id="notif-bell" aria-label="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="notif-badge"></span>

        <div id="notif-dropdown">
          <div class="notif-header" id="notif-title"></div>
          <div id="notif-list"></div>
        </div>
      </div>
      <select id="lang-toggle">
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
      <span class="user-name" id="topbar-user"></span>
      <button id="logout-btn">Logout</button>
    </div>
    <div id="content"></div>
  </div>
</div>

  function t(key) {
    const lang = S.lang;
    return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || (TRANSLATIONS.en[key]) || key;
  }

  // ---------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------
  const S = {
    token: localStorage.getItem('wo_token') || null,
    user: JSON.parse(localStorage.getItem('wo_user') || 'null'),
    lang: localStorage.getItem('wo_lang') || 'en',
    page: 'dashboard',
    cache: {},
  };

  const PAGES = [
    { key: 'dashboard', labelKey: 'nav.dashboard', page: null },
    { key: 'crm', labelKey: 'nav.crm', page: 'crm' },
    { key: 'products', labelKey: 'nav.products', page: 'products' },
    { key: 'quotes', labelKey: 'nav.quotes', page: 'quotes' },
    { key: 'payments', labelKey: 'nav.payments', page: 'payments' },
    { key: 'procurement', labelKey: 'nav.procurement', page: 'procurement' },
    { key: 'scheduling', labelKey: 'nav.scheduling', page: 'scheduling' },
    { key: 'expenses', labelKey: 'nav.expenses', page: 'expenses' },
    { key: 'tasks', labelKey: 'nav.tasks', page: 'tasks' },
    { key: 'claims', labelKey: 'nav.claims', page: 'claims' },
    { key: 'logistics', labelKey: 'nav.logistics', page: 'logistics' },
    { key: 'reports', labelKey: 'nav.reports', page: 'reports' },
    { key: 'settings', labelKey: 'nav.settings', page: null },
    { key: 'users', labelKey: 'nav.users', adminOnly: true },
    { key: 'activity', labelKey: 'nav.activity', adminOnly: true },
  ];

  function canAccess(pageDef) {
    if (!S.user) return false;
    if (userHasRole('admin')) return true;
    if (pageDef.adminOnly) return false;
    if (!pageDef.page) return true;
    return (S.user.pages || []).includes(pageDef.page);
  }

  // ---------------------------------------------------------------------
  // API helper
  // ---------------------------------------------------------------------
  async function api(path, { method = 'GET', body } = {}) {
    const res = await fetch('/api/' + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(S.token ? { Authorization: 'Bearer ' + S.token } : {}),
      },
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    if (res.status === 401) {
      doLogout();
      throw new Error('Unauthorized');
    }
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function fmtMoney(n, currency) {
    return `${currency || 'USD'} ${Number(n || 0).toFixed(2)}`;
  }

  function waLink(phone, text) {
    const digits = String(phone || '').replace(/[^\d]/g, '');
    if (!digits) return null;
    const q = text ? `?text=${encodeURIComponent(text)}` : '';
    return `https://wa.me/${digits}${q}`;
  }

  function userHasRole(role) {
    return (S.user.roles || []).includes(role);
  }
  function userHasAnyRole(roles) {
    return (S.user.roles || []).some((r) => roles.includes(r));
  }

  function timeAgo(ms) {
    if (!ms) return t('crm.never');
    const days = Math.floor((Date.now() - ms) / (24 * 60 * 60 * 1000));
    if (days <= 0) return S.lang === 'zh' ? '今天' : 'Today';
    if (days === 1) return S.lang === 'zh' ? '1 天前' : '1 day ago';
    return S.lang === 'zh' ? `${days} 天前` : `${days} days ago`;
  }

  // ---------------------------------------------------------------------
  // Login
  // ---------------------------------------------------------------------
  const loginScreen = document.getElementById('login-screen');
  const appShell = document.getElementById('app-shell');
  const pinInput = document.getElementById('pin-input');
  const loginError = document.getElementById('login-error');

  async function doLogin() {
    loginError.textContent = '';
    const pin = pinInput.value.trim();
    if (!pin) return;
    try {
      const data = await api('auth', { method: 'POST', body: { pin } });
      S.token = data.token;
      S.user = data.user;
      localStorage.setItem('wo_token', S.token);
      localStorage.setItem('wo_user', JSON.stringify(S.user));
      pinInput.value = '';
      showApp();
    } catch (e) {
      loginError.textContent = t('login.error');
    }
  }

  document.getElementById('pin-submit').addEventListener('click', doLogin);
  pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

  function doLogout() {
    stopNotificationPolling();
    S.token = null;
    S.user = null;
    localStorage.removeItem('wo_token');
    localStorage.removeItem('wo_user');
    appShell.classList.remove('active');
    loginScreen.style.display = 'flex';
  }
  document.getElementById('logout-btn').addEventListener('click', doLogout);

  // ---------------------------------------------------------------------
  // Task-assignment notifications — polls the tasks list and flags any
  // task assigned to the current user created since they last opened the
  // Tasks page. No separate backend domain; derived from api('tasks').
  // ---------------------------------------------------------------------
  let notifPollHandle = null;
  let notifItems = [];
  const notifBell = document.getElementById('notif-bell');
  const notifBadge = document.getElementById('notif-badge');
  const notifDropdown = document.getElementById('notif-dropdown');
  const notifList = document.getElementById('notif-list');

  function tasksSeenKey() {
    return `wo_tasks_seen_${S.user ? S.user.id : 'anon'}`;
  }
  function getTasksSeenAt() {
    return Number(localStorage.getItem(tasksSeenKey()) || 0);
  }
  function markTasksSeen() {
    localStorage.setItem(tasksSeenKey(), String(Date.now()));
    notifItems = [];
    renderNotifBadge();
  }

  function renderNotifBadge() {
    const count = notifItems.length;
    notifBadge.textContent = count > 9 ? '9+' : String(count);
    notifBadge.classList.toggle('show', count > 0);
  }

  function renderNotifDropdown() {
    document.getElementById('notif-title').textContent = t('notif.title');
    notifList.innerHTML = notifItems.length
      ? notifItems.map((task) => `
          <div class="notif-item" data-task-id="${task.id}">
            <div class="notif-item-title">${esc(task.title)}</div>
            <div class="notif-item-meta">${t('notif.assigned')}${task.dueDate ? ` — ${t('tasks.dueDate')}: ${esc(task.dueDate)}` : ''}</div>
          </div>`).join('')
      : `<div class="notif-empty">${t('notif.empty')}</div>`;
    notifList.querySelectorAll('.notif-item').forEach((el) => el.addEventListener('click', () => {
      notifDropdown.classList.remove('open');
      navigate('tasks');
    }));
  }

  async function refreshNotifications() {
    if (!S.user || !S.token) return;
    try {
      const tasks = await api('tasks');
      const seenAt = getTasksSeenAt();
      notifItems = tasks.filter((task) => task.assignedTo === S.user.id && task.status !== 'done' && (task.createdAt || 0) > seenAt);
    } catch (e) {
      notifItems = [];
    }
    renderNotifBadge();
    if (notifDropdown.classList.contains('open')) renderNotifDropdown();
  }

  function startNotificationPolling() {
    stopNotificationPolling();
    refreshNotifications();
    notifPollHandle = setInterval(refreshNotifications, 45000);
  }
  function stopNotificationPolling() {
    if (notifPollHandle) clearInterval(notifPollHandle);
    notifPollHandle = null;
  }

  notifBell.addEventListener('click', (e) => {
    e.stopPropagation();
    const opening = !notifDropdown.classList.contains('open');
    notifDropdown.classList.toggle('open', opening);
    if (opening) renderNotifDropdown();
  });
  document.addEventListener('click', (e) => {
    if (!notifDropdown.contains(e.target) && e.target !== notifBell) notifDropdown.classList.remove('open');
  });

  // ---------------------------------------------------------------------
  // Shell / nav
  // ---------------------------------------------------------------------
  const navLinks = document.getElementById('nav-links');
  const contentEl = document.getElementById('content');
  const langToggle = document.getElementById('lang-toggle');
  const sidebarEl = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  const sidebarToggle = document.getElementById('sidebar-toggle');

  function setSidebar(open) {
    S.sidebarOpen = open;
    sidebarEl.classList.toggle('open', open);
    sidebarOverlay.classList.toggle('open', open);
    localStorage.setItem('wo_sidebar_open', open ? 'true' : 'false');
  }
  sidebarToggle.addEventListener('click', () => setSidebar(!S.sidebarOpen));
  sidebarOverlay.addEventListener('click', () => setSidebar(false));

  function renderNav() {
    navLinks.innerHTML = '';
    PAGES.filter(canAccess).forEach((p) => {
      const a = document.createElement('a');
      a.textContent = t(p.labelKey);
      a.className = p.key === S.page ? 'active' : '';
      a.addEventListener('click', () => navigate(p.key));
      navLinks.appendChild(a);
    });
  }

  function applyStaticText() {
    document.getElementById('login-title').textContent = t('login.title');
    document.getElementById('pin-submit').textContent = t('login.submit');
    document.getElementById('topbar-user').textContent = S.user ? `${S.user.name} (${(S.user.roles || []).join(', ')})` : '';
    document.getElementById('logout-btn').textContent = t('action.logout');
    langToggle.value = S.lang;
  }

  langToggle.addEventListener('change', () => {
    S.lang = langToggle.value;
    localStorage.setItem('wo_lang', S.lang);
    applyStaticText();
    renderNav();
    renderPage();
  });

  function navigate(key) {
    S.page = key;
    renderNav();
    renderPage();
    setSidebar(false);
  }

  function showApp() {
    loginScreen.style.display = 'none';
    appShell.classList.add('active');
    applyStaticText();
    renderNav();
    renderPage();
    setSidebar(false);
    startNotificationPolling();
  }

  // ---------------------------------------------------------------------
  // Generic modal form
  // ---------------------------------------------------------------------
  function openModal({ title, fields, values = {}, onSubmit }) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<h3>${esc(title)}</h3><form id="modal-form"></form>`;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

    const form = modal.querySelector('#modal-form');

    fields.forEach((f) => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      const val = values[f.name] ?? f.default ?? '';
      let inputHtml;
      if (f.type === 'select') {
        inputHtml = `<select name="${f.name}">${f.options.map((o) => `<option value="${esc(o.value)}" ${o.value === val ? 'selected' : ''}>${esc(o.label)}</option>`).join('')}</select>`;
      } else if (f.type === 'textarea') {
        inputHtml = `<textarea name="${f.name}">${esc(val)}</textarea>`;
      } else if (f.type === 'checkboxGroup') {
        const selected = Array.isArray(val) ? val : [];
        wrap.innerHTML = `<label>${esc(f.label)}</label><div class="checkbox-group">${f.options.map((o) => `
          <label><input type="checkbox" data-group="${f.name}" value="${esc(o.value)}" ${selected.includes(o.value) ? 'checked' : ''}> ${esc(o.label)}</label>`).join('')}</div>`;
        form.appendChild(wrap);
        return;
      } else {
        inputHtml = `<input type="${f.type || 'text'}" name="${f.name}" value="${esc(val)}" ${f.required ? 'required' : ''} ${f.step ? `step="${f.step}"` : ''}>`;
      }
      wrap.innerHTML = `<label>${esc(f.label)}</label>${inputHtml}`;
      form.appendChild(wrap);
    });

    if (typeof onSubmit === 'string' && onSubmit === 'lineItems') {
      // handled by caller (quotes) which injects its own line-item UI after open
    }

    const actions = document.createElement('div');
    actions.className = 'modal-actions';
    actions.innerHTML = `<button type="button" class="btn" id="modal-cancel">${t('action.cancel')}</button><button type="submit" class="btn btn-primary" id="modal-save" form="modal-form">${t('action.save')}</button>`;
    modal.appendChild(actions);

    modal.querySelector('#modal-cancel').addEventListener('click', () => overlay.remove());

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const out = {};
      fields.forEach((f) => {
        if (f.type === 'checkboxGroup') {
          out[f.name] = Array.from(form.querySelectorAll(`input[data-group="${f.name}"]:checked`)).map((i) => i.value);
        } else {
          const el = form.querySelector(`[name="${f.name}"]`);
          out[f.name] = f.type === 'number' ? Number(el.value) : el.value;
        }
      });
      try {
        await onSubmit(out, overlay, modal);
      } catch (err) {
        toast(err.message);
      }
    });

    return { overlay, modal, form };
  }

  // ---------------------------------------------------------------------
  // Shared client-side search + pagination — the KV storage model already
  // fetches a domain's whole list in one call, so "pagination" here means
  // capping how many rows get rendered as DOM at once, not a paginated
  // fetch. Cheap, and the part that actually matters once a list is in the
  // thousands of rows.
  // ---------------------------------------------------------------------
  const DEFAULT_PAGE_SIZE = 50;

  function filterAndPaginate(list, { searchTerm, searchFields, page, pageSize }) {
    let filtered = list;
    if (searchTerm && searchFields && searchFields.length) {
      const q = searchTerm.toLowerCase();
      filtered = list.filter((item) => searchFields.some((f) => String(item[f] ?? '').toLowerCase().includes(q)));
    }
    const size = pageSize || DEFAULT_PAGE_SIZE;
    const totalPages = Math.max(1, Math.ceil(filtered.length / size));
    const clampedPage = Math.min(Math.max(1, page || 1), totalPages);
    const start = (clampedPage - 1) * size;
    return {
      pageItems: filtered.slice(start, start + size),
      totalPages,
      page: clampedPage,
      totalFiltered: filtered.length,
    };
  }

  function pagerHtml(page, totalPages, totalFiltered) {
    return `
      <span class="pager-count">${totalFiltered} ${t('common.total')}</span>
      <button type="button" class="btn btn-sm" data-page-nav="prev" ${page <= 1 ? 'disabled' : ''}>‹</button>
      <span class="pager-page">${page} / ${totalPages}</span>
      <button type="button" class="btn btn-sm" data-page-nav="next" ${page >= totalPages ? 'disabled' : ''}>›</button>
    `;
  }

  // Wires a search input + pager container that already exist in the DOM.
  // Calls onChange(searchTerm, page) whenever either changes; caller owns
  // re-rendering the row data itself.
  function bindListToolbar({ searchInputId, pagerId, onChange }) {
    const state = { searchTerm: '', page: 1 };
    const searchInput = document.getElementById(searchInputId);
    const pagerEl = document.getElementById(pagerId);
    searchInput.addEventListener('input', (e) => {
      state.searchTerm = e.target.value;
      state.page = 1;
      onChange(state);
    });
    pagerEl.addEventListener('click', (e) => {
      const nav = e.target.dataset.pageNav;
      if (!nav) return;
      state.page += nav === 'next' ? 1 : -1;
      onChange(state);
    });
    return state;
  }

              <button class="btn btn-sm btn-danger del-btn" data-id="${item.id}">${t('action.delete')}</button>

          </tr>`).join('')

          title: t('action.edit'),

            load();
          },

      }));

      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`${apiPath}?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    const toolbarState = bindListToolbar({ searchInputId: 'list-search-input', pagerId: 'list-pager', onChange: renderRows });

    async function load() {
      fullList = await api(apiPath);
      S.cache[apiPath] = fullList;
      toolbarState.page = 1;
      renderRows(toolbarState);
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields,
        values: {},
        onSubmit: async (vals, overlay) => {
          await api(apiPath, { method: 'POST', body: vals });
          overlay.remove();
          toast('Saved');
          load();

      } else {
        await api('customers', { method: 'POST', body: payload });
      }
      overlay.remove();
      toast('Saved');
      onSaved();
    });
  }

  // ---------------------------------------------------------------------
  // Page: Products — needs attribute nesting, so it doesn't use the
  // generic renderCrudPage (see renderProductsWrapped near the router).
  // ---------------------------------------------------------------------
  function buildProductPayload(vals) {
    const { attrChargerType, attrVoltage, attrAmperage, attrPowerKw, attrConnectorType, attrCordLength, ...rest } = vals;
    return {
      ...rest,
      attributes: {
        chargerType: attrChargerType,
        voltage: attrVoltage,
        amperage: attrAmperage,
        powerKw: attrPowerKw,
        connectorType: attrConnectorType,
        cordLength: attrCordLength,
      },
    };
  }

  function flattenProduct(item) {
    const a = item.attributes || {};
    return {
      ...item,
      attrChargerType: a.chargerType,
      attrVoltage: a.voltage,
      attrAmperage: a.amperage,
      attrPowerKw: a.powerKw,
      attrConnectorType: a.connectorType,
      attrCordLength: a.cordLength,
    };
  }

        <div class="pager" id="list-pager"></div>
      </div>
      <div class="card"><table>
        <thead><tr><th>#</th><th>${t('quotes.buyer')}</th><th>${t('quotes.status')}</th><th>${t('quotes.total')}</th><th></th></tr></thead>
        <tbody id="quotes-body"><tr class="empty-row"><td colspan="5">${t('common.loading')}</td></tr></tbody>
      </table></div>
    `;

    const [rawQuotes, customers] = await Promise.all([api('quotes'), api('customers').catch(() => [])]);
    const buyerName = (id) => (customers.find((c) => c.id === id) || {}).companyName || '—';
    const quotes = rawQuotes.map((q) => ({ ...q, _buyerName: buyerName(q.buyerId) }));

    function renderRows(state) {
      const { pageItems, totalPages, page: p, totalFiltered } = filterAndPaginate(quotes, {
        searchTerm: state.searchTerm, searchFields: ['quoteNumber', '_buyerName'], page: state.page,
      });
      state.page = p;
      const tbody = document.getElementById('quotes-body');
      tbody.innerHTML = pageItems.length
        ? pageItems.map((q) => `
          <tr>
            <td>${esc(q.quoteNumber)}</td>
            <td>${esc(q._buyerName)}</td>
            <td><span class="badge status-${esc(q.status)}">${esc(q.status.replace('_', ' '))}</span></td>
            <td>${fmtMoney(q.total, q.currency)}</td>
            <td>
              <button class="btn btn-sm edit-btn" data-id="${q.id}">${t('action.edit')}</button>
              <a class="btn btn-sm" href="/api/quote-print?id=${q.id}" target="_blank" rel="noopener" onclick="return withAuthHeaderPrint('${q.id}', event)">${t('action.print')}</a>
              <button class="btn btn-sm btn-danger del-btn" data-id="${q.id}">${t('action.delete')}</button>
            </td>
          </tr>`).join('')
        : `<tr class="empty-row"><td colspan="5">${t('common.none')}</td></tr>`;
      document.getElementById('list-pager').innerHTML = pagerHtml(p, totalPages, totalFiltered);

      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`quotes?id=${btn.dataset.id}`, { method: 'DELETE' });
        renderQuotes();
      }));

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const quote = quotes.find((q) => q.id === btn.dataset.id);
        openQuoteModal(quote, customers);
      }));
    }

    const toolbarState = bindListToolbar({ searchInputId: 'list-search-input', pagerId: 'list-pager', onChange: renderRows });
    renderRows(toolbarState);

    document.getElementById('add-quote-btn').addEventListener('click', () => openQuoteModal(null, customers));
  }

  function openQuoteModal(quote, customers) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const isEdit = !!quote;
    const lineItems = (quote && quote.lineItems && quote.lineItems.length) ? quote.lineItems.map((li) => ({ ...li })) : [{ description: '', qty: 1, unitPrice: 0 }];

    function lineItemsRowsHtml() {
      return lineItems.map((li, idx) => `
        <tr>
          <td><input data-li="description" data-idx="${idx}" value="${esc(li.description || '')}"></td>
          <td><input data-li="qty" data-idx="${idx}" type="number" min="0" value="${esc(li.qty ?? 1)}"></td>
          <td><input data-li="unitPrice" data-idx="${idx}" type="number" min="0" step="0.01" value="${esc(li.unitPrice ?? 0)}"></td>
          <td>${((Number(li.qty) || 0) * (Number(li.unitPrice) || 0)).toFixed(2)}</td>
          <td><button type="button" class="btn btn-sm btn-danger" data-remove-li="${idx}">✕</button></td>
        </tr>`).join('');
    }

    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <h3>${isEdit ? t('action.edit') : t('action.add')} — ${t('quotes.title')}</h3>
      <form id="quote-form">
        <div class="field-row">
          <div class="field">
            <label>${t('quotes.buyer')}</label>
            <select name="buyerId">${customers.map((c) => `<option value="${c.id}" ${quote && quote.buyerId === c.id ? 'selected' : ''}>${esc(c.companyName)}</option>`).join('')}</select>
          </div>
          <div class="field">
            <label>${t('quotes.currency')}</label>
            <select name="currency">${['RMB', 'USD', 'EUR'].map((c) => `<option value="${c}" ${(quote ? quote.currency === c : c === 'RMB') ? 'selected' : ''}>${c}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field"><label>${t('quotes.fxNote')}</label><input name="fxNote" value="${esc(quote ? quote.fxNote : '')}" placeholder="e.g. 1 USD = 7.2 RMB, quoted in USD"></div>
        <div class="field-row">
          <div class="field"><label>${t('quotes.depositPercent')}</label><input name="depositPercent" type="number" min="0" max="100" value="${quote ? quote.depositPercent : 30}"></div>
          <div class="field"><label>${t('quotes.readyBy')}</label><input name="readyByDate" type="date" value="${quote && quote.readyByDate ? quote.readyByDate : ''}"></div>
        </div>
        ${isEdit ? `<div class="field"><label>${t('quotes.status')}</label><select name="status">${QUOTE_STATUSES.map((s) => `<option value="${s}" ${quote.status === s ? 'selected' : ''}>${esc(s.replace('_', ' '))}</option>`).join('')}</select></div>` : ''}
        <label style="font-size:12px;font-weight:600;color:var(--muted);">${t('quotes.lineItems')}</label>
        <table class="line-items-table">
          <thead><tr><th>${t('quotes.description')}</th><th>${t('quotes.qty')}</th><th>${t('quotes.unitPrice')}</th><th>${t('quotes.lineTotal')}</th><th></th></tr></thead>
          <tbody id="li-body">${lineItemsRowsHtml()}</tbody>
        </table>
        <button type="button" class="btn btn-sm" id="add-line-btn">${t('quotes.addLine')}</button>
        <div class="field" style="margin-top:14px;"><label>${t('quotes.notes')}</label><textarea name="notes">${esc(quote ? quote.notes : '')}</textarea></div>
      </form>
      <div class="modal-actions">
        <button type="button" class="btn" id="quote-cancel">${t('action.cancel')}</button>
        <button type="submit" class="btn btn-primary" form="quote-form">${t('action.save')}</button>
      </div>
    `;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    modal.querySelector('#quote-cancel').addEventListener('click', () => overlay.remove());

    function refreshLiBody() {
      modal.querySelector('#li-body').innerHTML = lineItemsRowsHtml();
      bindLiInputs();
    }

    function bindLiInputs() {
      modal.querySelectorAll('[data-li]').forEach((input) => {
        input.addEventListener('input', () => {
          const idx = Number(input.dataset.idx);
          const field = input.dataset.li;
          lineItems[idx][field] = field === 'description' ? input.value : Number(input.value);
          refreshLiBody();
        });
      });
      modal.querySelectorAll('[data-remove-li]').forEach((btn) => {
        btn.addEventListener('click', () => {
          lineItems.splice(Number(btn.dataset.removeLi), 1);
          if (!lineItems.length) lineItems.push({ description: '', qty: 1, unitPrice: 0 });
          refreshLiBody();
        });
      });
    }
    bindLiInputs();

    modal.querySelector('#add-line-btn').addEventListener('click', () => {
      lineItems.push({ description: '', qty: 1, unitPrice: 0 });
      refreshLiBody();
    });

    modal.querySelector('#quote-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const payload = {
        buyerId: form.buyerId.value,
        currency: form.currency.value,
        fxNote: form.fxNote.value,
        depositPercent: Number(form.depositPercent.value) || 0,
        readyByDate: form.readyByDate.value || null,
        notes: form.notes.value,
        lineItems,
      };
      if (isEdit) {
        payload.id = quote.id;
        if (form.status) payload.status = form.status.value;
        await api('quotes', { method: 'PUT', body: payload });
      } else {
        await api('quotes', { method: 'POST', body: payload });
      }
      overlay.remove();
      toast('Saved');
      renderQuotes();
    });
  }

  // Print links need the bearer token; open via fetch->blob since <a> can't
  // carry an Authorization header.
  window.withAuthHeaderPrint = function (id, event) {
    event.preventDefault();
    fetch(`/api/quote-print?id=${id}`, { headers: { Authorization: 'Bearer ' + S.token } })
      .then((r) => r.text())
      .then((html) => {
        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
      });
    return false;
  };

  // ---------------------------------------------------------------------
  // Page: Procurement / Supplier Sourcing
  // ---------------------------------------------------------------------
  const PO_STATUSES = ['rfq', 'quoted', 'ordered', 'in_production', 'ready', 'shipped', 'received', 'cancelled'];

  function procurementTabsHtml(active) {
    return `<div class="toolbar" style="margin-bottom:12px;">
      <div>
        <button class="btn btn-sm ${active === 'suppliers' ? 'btn-primary' : ''}" id="tab-suppliers">${t('procurement.suppliersTab')}</button>
        <button class="btn btn-sm ${active === 'pos' ? 'btn-primary' : ''}" id="tab-pos">${t('procurement.posTab')}</button>
      </div>
    </div>`;
  }

  function bindProcurementTabs() {
    document.getElementById('tab-suppliers').addEventListener('click', () => renderSuppliersTab());
    document.getElementById('tab-pos').addEventListener('click', () => renderPurchaseOrdersTab());
  }

  function renderProcurement() {
    return (S.procurementTab === 'pos') ? renderPurchaseOrdersTab() : renderSuppliersTab();
  }

  async function renderSuppliersTab() {
    S.procurementTab = 'suppliers';
    contentEl.innerHTML = `<h2 class="page-title">${t('procurement.title')}</h2>${procurementTabsHtml('suppliers')}
      <div class="toolbar"><div></div><button class="btn btn-primary" id="add-btn">+ ${t('action.add')}</button></div>
      <div class="card"><table><thead><tr><th>${t('procurement.name')}</th><th>${t('procurement.contactName')}</th><th>${t('procurement.country')}</th><th>${t('procurement.leadTimeDays')}</th><th></th></tr></thead><tbody id="table-body"><tr class="empty-row"><td colspan="5">${t('common.loading')}</td></tr></tbody></table></div>
    `;
    bindProcurementTabs();

    const fields = [
      { name: 'name', label: t('procurement.name'), required: true },
      { name: 'contactName', label: t('procurement.contactName') },
      { name: 'contactPhone', label: t('procurement.contactPhone') },
      { name: 'country', label: t('procurement.country') },
      { name: 'leadTimeDays', label: t('procurement.leadTimeDays'), type: 'number' },
      { name: 'productsSupplied', label: t('procurement.productsSupplied'), type: 'textarea' },
    ];

    async function load() {
      const list = await api('suppliers');
      const tbody = document.getElementById('table-body');
      if (!tbody) return;
      if (!list.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5">${t('common.none')}</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((s) => {
        const link = waLink(s.contactPhone, `Hi ${s.contactName || ''}, `);
        return `<tr>
          <td>${esc(s.name)}</td><td>${esc(s.contactName || '')}</td><td>${esc(s.country || '')}</td><td>${esc(s.leadTimeDays ?? '')}</td>
          <td>
            <button class="btn btn-sm edit-btn" data-id="${s.id}">${t('action.edit')}</button>
            <button class="btn btn-sm btn-danger del-btn" data-id="${s.id}">${t('action.delete')}</button>
            ${link ? `<a class="wa-link" href="${link}" target="_blank" rel="noopener">${t('action.whatsapp')}</a>` : ''}
          </td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.edit-btn').forEach((btn) => btn.addEventListener('click', () => {
        const s = list.find((x) => x.id === btn.dataset.id);
        openModal({
          title: t('action.edit'),
          fields,
          values: s,
          onSubmit: async (vals, overlay) => {
            await api('suppliers', { method: 'PUT', body: { ...vals, id: s.id } });
            overlay.remove();
            toast('Saved');
            load();
          },
        });
      }));
      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`suppliers?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      openModal({
        title: t('action.add'),
        fields,
        values: {},
        onSubmit: async (vals, overlay) => {
          await api('suppliers', { method: 'POST', body: vals });
          overlay.remove();
          toast('Saved');
          load();
        },
      });
    });

    load();
  }

  function openPOModal(po, suppliers, quotes) {

    const isEdit = !!po;
    const items = (po && po.items && po.items.length) ? po.items.map((it) => ({ ...it })) : [{ description: '', qty: 1, unitCost: 0 }];

    function itemRowsHtml() {
      return items.map((it, idx) => `
        <tr>
          <td><input data-it="description" data-idx="${idx}" value="${esc(it.description || '')}"></td>
          <td><input data-it="qty" data-idx="${idx}" type="number" min="0" value="${esc(it.qty ?? 1)}"></td>
          <td><input data-it="unitCost" data-idx="${idx}" type="number" min="0" step="0.01" value="${esc(it.unitCost ?? 0)}"></td>
          <td>${((Number(it.qty) || 0) * (Number(it.unitCost) || 0)).toFixed(2)}</td>

        </tr>`).join('');

    const modal = document.createElement('div');

            <label>${t('procurement.supplier')}</label>

            <label>${t('procurement.linkedQuote')}</label>

          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>${t('procurement.leadTime')}</label><input name="leadTimeDays" type="number" min="0" value="${po && po.leadTimeDays != null ? po.leadTimeDays : ''}"></div>
          <div class="field"><label>${t('procurement.readyBy')}</label><input name="readyByDate" type="date" value="${po && po.readyByDate ? po.readyByDate : ''}"></div>
        </div>
        <div class="field">
          <label>${t('quotes.currency')}</label>
          <select name="currency">${['RMB', 'USD', 'EUR'].map((c) => `<option value="${c}" ${(po ? po.currency === c : c === 'RMB') ? 'selected' : ''}>${c}</option>`).join('')}</select>
        </div>
        ${isEdit ? `<div class="field"><label>${t('procurement.status')}</label><select name="status">${PO_STATUSES.map((s) => `<option value="${s}" ${po.status === s ? 'selected' : ''}>${esc(s.replace('_', ' '))}</option>`).join('')}</select></div>` : ''}
        <label style="font-size:12px;font-weight:600;color:var(--muted);">${t('procurement.items')}</label>
        <table class="line-items-table">
          <thead><tr><th>${t('procurement.description')}</th><th>${t('procurement.qty')}</th><th>${t('procurement.unitCost')}</th><th>${t('procurement.totalCost')}</th><th></th></tr></thead>
          <tbody id="it-body">${itemRowsHtml()}</tbody>
        </table>
        <button type="button" class="btn btn-sm" id="add-item-btn">${t('procurement.addLine')}</button>

      </form>
      <div class="modal-actions">
        <button type="button" class="btn" id="po-cancel">${t('action.cancel')}</button>
        <button type="submit" class="btn btn-primary" form="po-form">${t('action.save')}</button>
      </div>
    `;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    modal.querySelector('#po-cancel').addEventListener('click', () => overlay.remove());

    function refreshItBody() {
      modal.querySelector('#it-body').innerHTML = itemRowsHtml();
      bindItInputs();
    }
    function bindItInputs() {
      modal.querySelectorAll('[data-it]').forEach((input) => {
        input.addEventListener('input', () => {
          const idx = Number(input.dataset.idx);
          const field = input.dataset.it;
          items[idx][field] = field === 'description' ? input.value : Number(input.value);
          refreshItBody();

          refreshItBody();

      items.push({ description: '', qty: 1, unitCost: 0 });
      refreshItBody();

    modal.querySelector('#po-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const payload = {
        supplierId: form.supplierId.value,
        linkedQuoteId: form.linkedQuoteId.value || null,
        leadTimeDays: form.leadTimeDays.value ? Number(form.leadTimeDays.value) : null,
        readyByDate: form.readyByDate.value || null,
        currency: form.currency.value,
        notes: form.notes.value,
        items,
      };
      if (isEdit) {
        payload.id = po.id;

        await api('purchase-orders', { method: 'PUT', body: payload });
      } else {
        await api('purchase-orders', { method: 'POST', body: payload });
      }
      overlay.remove();
      toast('Saved');
      renderPurchaseOrdersTab();
    });
  }

  // ---------------------------------------------------------------------
  // Page: Scheduling — month calendar of quote/PO ready-by dates
  // ---------------------------------------------------------------------
  async function renderScheduling() {
    if (!S.schedulingMonth) {
      const now = new Date();
      S.schedulingMonth = { y: now.getFullYear(), m: now.getMonth() };
    }
    contentEl.innerHTML = `<h2 class="page-title">${t('scheduling.title')}</h2><div id="sched-container">${t('common.loading')}</div>`;

    const [quotes, pos] = await Promise.all([api('quotes').catch(() => []), api('purchase-orders').catch(() => [])]);

    function itemsForMonth(y, m) {
      const items = [];
      quotes.forEach((q) => {
        if (!q.readyByDate) return;
        const d = new Date(q.readyByDate);
        if (d.getFullYear() === y && d.getMonth() === m) items.push({ day: d.getDate(), label: `Q ${q.quoteNumber}`, type: 'quote' });
      });
      pos.forEach((po) => {
        if (!po.readyByDate) return;
        const d = new Date(po.readyByDate);
        if (d.getFullYear() === y && d.getMonth() === m) items.push({ day: d.getDate(), label: `PO ${po.poNumber}`, type: 'po' });
      });
      return items;
    }

    function renderMonth() {
      const { y, m } = S.schedulingMonth;
      const items = itemsForMonth(y, m);
      const firstDay = new Date(y, m, 1);
      const startWeekday = firstDay.getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const monthLabel = firstDay.toLocaleDateString(S.lang === 'zh' ? 'zh-CN' : 'en-US', { month: 'long', year: 'numeric' });

      const itemsByDay = {};
      items.forEach((it) => { (itemsByDay[it.day] = itemsByDay[it.day] || []).push(it); });

      let cells = '';
      for (let i = 0; i < startWeekday; i++) cells += `<div class="cal-cell empty"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const dayItems = itemsByDay[d] || [];
        cells += `<div class="cal-cell"><div class="cal-day">${d}</div>${dayItems.map((it) => `<div class="cal-chip cal-chip-${it.type}">${esc(it.label)}</div>`).join('')}</div>`;
      }

      document.getElementById('sched-container').innerHTML = `
        <div class="toolbar">
          <div>
            <button class="btn btn-sm" id="prev-month">${t('scheduling.prev')}</button>
            <strong style="margin:0 10px;">${esc(monthLabel)}</strong>
            <button class="btn btn-sm" id="next-month">${t('scheduling.next')}</button>
          </div>
          <button class="btn btn-sm" id="today-btn">${t('scheduling.today')}</button>
        </div>
        <div class="cal-grid cal-header">${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map((d) => `<div>${d}</div>`).join('')}</div>
        <div class="cal-grid">${cells}</div>
        ${!items.length ? `<div class="muted" style="margin-top:16px;">${t('scheduling.noItems')}</div>` : ''}
      `;

      document.getElementById('prev-month').addEventListener('click', () => {
        S.schedulingMonth = m === 0 ? { y: y - 1, m: 11 } : { y, m: m - 1 };
        renderMonth();
      });
      document.getElementById('next-month').addEventListener('click', () => {
        S.schedulingMonth = m === 11 ? { y: y + 1, m: 0 } : { y, m: m + 1 };
        renderMonth();
      });
      document.getElementById('today-btn').addEventListener('click', () => {
        const now = new Date();
        S.schedulingMonth = { y: now.getFullYear(), m: now.getMonth() };
        renderMonth();
      });
    }

    renderMonth();
  }

  const EXPENSE_PERIOD_DAYS = { '24h': 1, '7d': 7, '30d': 30, '1y': 365 };

  function expenseCategoryLabel(cat) {
    const key = 'expenses.cat.' + cat;
    return TRANSLATIONS.en[key] ? t(key) : cat;

  async function renderExpenses() {
    if (!S.expensePeriod) S.expensePeriod = '30d';

    contentEl.innerHTML = `
      <h2 class="page-title">${t('expenses.title')}</h2>
      <div class="toolbar" style="align-items:flex-start;">
        <div class="stat-card" style="min-width:220px;">
          <div class="label">${t('expenses.totalThisPeriod')}</div>
          <div id="period-total-value" style="font-size:18px;font-weight:700;margin-top:6px;">…</div>
        </div>
        <div>
          ${Object.keys(EXPENSE_PERIOD_DAYS).map((p) => `<button class="btn btn-sm period-btn" data-period="${p}">${t('expenses.periodToggle.' + p)}</button>`).join(' ')}
        </div>
      </div>
      <div class="toolbar">
        <div></div>

      </div>
      <div class="card"><table><thead><tr><th>${t('expenses.date')}</th><th>${t('expenses.category')}</th><th>${t('expenses.amount')}</th><th>${t('expenses.submittedBy')}</th><th>${t('expenses.status')}</th><th></th></tr></thead><tbody id="table-body"><tr class="empty-row"><td colspan="6">${t('common.loading')}</td></tr></tbody></table></div>
    `;

    const isApprover = userHasAnyRole(['admin', 'finance']);
    let allExpenses = [];
    let customCategories = [];
    let appSettings = { defaultCurrency: 'RMB' };

    function buildCategoryOptions() {
      const builtins = ['travel', 'meals', 'shipping', 'office'].map((v) => ({ value: v, label: t('expenses.cat.' + v) }));
      const custom = customCategories.map((c) => ({ value: c, label: c }));
      return [...builtins, ...custom, { value: 'other', label: t('expenses.cat.other') }];
    }

    function highlightPeriodButtons() {
      contentEl.querySelectorAll('.period-btn').forEach((btn) => {
        btn.classList.toggle('btn-primary', btn.dataset.period === S.expensePeriod);
      });
    }

    function renderPeriodTotal() {
      const days = EXPENSE_PERIOD_DAYS[S.expensePeriod] || 30;
      const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
      const totals = {};
      allExpenses.forEach((e) => {
        const ts = e.date ? new Date(e.date + 'T00:00:00').getTime() : (e.createdAt || 0);
        if (!isNaN(ts) && ts >= cutoff) {
          const cur = e.currency || 'RMB';
          totals[cur] = (totals[cur] || 0) + (Number(e.amount) || 0);
        }
      });
      const entries = Object.entries(totals);
      document.getElementById('period-total-value').innerHTML = entries.length
        ? entries.map(([cur, amt]) => `<div>${fmtMoney(amt, cur)}</div>`).join('')
        : fmtMoney(0, 'RMB');
      highlightPeriodButtons();
    }

    contentEl.querySelectorAll('.period-btn').forEach((btn) => btn.addEventListener('click', () => {
      S.expensePeriod = btn.dataset.period;
      renderPeriodTotal();
    }));

    async function load() {
      const [list, cats, settings] = await Promise.all([
        api('expenses'),
        api('expense-categories').catch(() => []),
        api('settings').catch(() => appSettings),
      ]);
      allExpenses = list;
      customCategories = cats;
      appSettings = settings;
      renderPeriodTotal();

      const tbody = document.getElementById('table-body');
      if (!list.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="6">${t('common.none')}</td></tr>`;
      } else {
        tbody.innerHTML = list.map((e) => `
          <tr>
            <td>${esc(e.date || '')}</td>
            <td>${esc(expenseCategoryLabel(e.category))}</td>
            <td>${fmtMoney(e.amount, e.currency)}</td>
            <td>${esc(e.submittedByName || '')}</td>
            <td><span class="badge">${esc(e.status)}</span></td>
            <td>
              ${e.photoDataUrl ? `<a href="${e.photoDataUrl}" target="_blank" rel="noopener" class="btn btn-sm">${t('expenses.photo')}</a>` : ''}
              ${isApprover && e.status === 'pending' ? `<button class="btn btn-sm" data-approve="${e.id}">${t('expenses.approve')}</button><button class="btn btn-sm btn-danger" data-reject="${e.id}">${t('expenses.reject')}</button>` : ''}
              <button class="btn btn-sm btn-danger del-btn" data-id="${e.id}">${t('action.delete')}</button>
            </td>
          </tr>`).join('');
      }

      tbody.querySelectorAll('[data-approve]').forEach((btn) => btn.addEventListener('click', async () => {
        await api('expenses', { method: 'PUT', body: { id: btn.dataset.approve, status: 'approved' } });
        load();
      }));
      tbody.querySelectorAll('[data-reject]').forEach((btn) => btn.addEventListener('click', async () => {
        await api('expenses', { method: 'PUT', body: { id: btn.dataset.reject, status: 'rejected' } });
        load();
      }));
      tbody.querySelectorAll('.del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        await api(`expenses?id=${btn.dataset.id}`, { method: 'DELETE' });
        load();
      }));
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      openExpenseModal(buildCategoryOptions(), appSettings.defaultCurrency || 'RMB', load);
    });
    document.getElementById('expense-settings-btn').addEventListener('click', () => {
      openExpenseSettingsModal(customCategories, userHasRole('admin'), appSettings.defaultCurrency || 'RMB', load);
    });

    load();
  }

  function openExpenseSettingsModal(customCategories, isAdmin, currentDefaultCurrency, onChanged) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<h3>${t('expenses.settingsTitle')}</h3>`;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

    const currencyWrap = document.createElement('div');
    currencyWrap.className = 'field';
    if (isAdmin) {
      currencyWrap.innerHTML = `
        <label>${t('settings.defaultCurrency')}</label>
        <select id="default-currency-select">${['RMB', 'USD', 'EUR'].map((c) => `<option value="${c}" ${currentDefaultCurrency === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
      `;
    } else {
      currencyWrap.innerHTML = `<label>${t('settings.defaultCurrency')}</label><div class="muted">${esc(currentDefaultCurrency)} — ${t('expenses.adminOnlyCurrency')}</div>`;
    }
    modal.appendChild(currencyWrap);

    const catsWrap = document.createElement('div');
    catsWrap.style.marginTop = '18px';
    catsWrap.innerHTML = `<label style="font-size:12px;font-weight:600;color:var(--muted);">${t('expenses.manageCategories')}</label>`;
    const catsList = document.createElement('div');
    catsList.style.marginTop = '8px';
    catsWrap.appendChild(catsList);
    modal.appendChild(catsWrap);

    function renderCatsList() {
      if (!customCategories.length) {
        catsList.innerHTML = `<div class="muted" style="font-size:13px;">${t('expenses.noCategoriesSaved')}</div>`;
        return;
      }
      catsList.innerHTML = customCategories.map((c, idx) => `
        <div class="field-row" style="grid-template-columns:1fr auto auto;gap:6px;align-items:center;margin-bottom:8px;">
          <input type="text" data-idx="${idx}" class="cat-rename-input" value="${esc(c)}">
          <button type="button" class="btn btn-sm cat-save-btn" data-old="${esc(c)}" data-idx="${idx}">${t('action.save')}</button>
          <button type="button" class="btn btn-sm btn-danger cat-del-btn" data-name="${esc(c)}">${t('action.delete')}</button>
        </div>`).join('');

      catsList.querySelectorAll('.cat-save-btn').forEach((btn) => btn.addEventListener('click', async () => {
        const idx = Number(btn.dataset.idx);
        const input = catsList.querySelector(`.cat-rename-input[data-idx="${idx}"]`);
        const newName = input.value.trim();
        const oldName = btn.dataset.old;
        if (!newName || newName === oldName) return;
        try {
          customCategories = await api('expense-categories', { method: 'PUT', body: { oldName, newName } });
          toast('Saved');
          renderCatsList();
        } catch (err) {
          toast(err.message);
        }
      }));
      catsList.querySelectorAll('.cat-del-btn').forEach((btn) => btn.addEventListener('click', async () => {
        if (!confirm(t('common.confirmDelete'))) return;
        try {
          customCategories = await api(`expense-categories?name=${encodeURIComponent(btn.dataset.name)}`, { method: 'DELETE' });
          renderCatsList();
        } catch (err) {
          toast(err.message);
        }
      }));
    }
    renderCatsList();

    const actions = document.createElement('div');
    actions.className = 'modal-actions';
    actions.innerHTML = `<button type="button" class="btn" id="exp-settings-close">${t('action.close')}</button>${isAdmin ? `<button type="button" class="btn btn-primary" id="exp-settings-save">${t('action.save')}</button>` : ''}`;
    modal.appendChild(actions);

    function close() {
      overlay.remove();
      onChanged();
    }
    modal.querySelector('#exp-settings-close').addEventListener('click', close);
    if (isAdmin) {
      modal.querySelector('#exp-settings-save').addEventListener('click', async () => {
        const newCurrency = document.getElementById('default-currency-select').value;
        try {
          await api('settings', { method: 'PUT', body: { defaultCurrency: newCurrency } });
          toast('Saved');
          close();
        } catch (err) {
          toast(err.message);
        }
      });
    }
  }

  function openExpenseModal(categoryOptions, defaultCurrency, onSaved) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<h3>${t('action.add')}</h3><form id="expense-form"></form>`;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

    const form = modal.querySelector('#expense-form');

    const categoryWrap = document.createElement('div');
    categoryWrap.className = 'field';
    categoryWrap.innerHTML = `<label>${t('expenses.category')}</label><select name="category">${categoryOptions.map((o) => `<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('')}</select>`;
    form.appendChild(categoryWrap);

    const customCatWrap = document.createElement('div');
    customCatWrap.className = 'field';
    customCatWrap.style.display = 'none';
    customCatWrap.innerHTML = `
      <label>${t('expenses.customCategoryName')}</label>
      <input type="text" name="customCategory">
      <label style="display:flex;align-items:center;gap:6px;font-weight:400;margin-top:6px;">
        <input type="checkbox" name="saveCategory"> ${t('expenses.saveCategory')}
      </label>
    `;
    form.appendChild(customCatWrap);

    categoryWrap.querySelector('select').addEventListener('change', (e) => {
      customCatWrap.style.display = e.target.value === 'other' ? 'block' : 'none';
    });

    const simpleFields = [
      { name: 'amount', label: t('expenses.amount'), type: 'number', step: '0.01' },
      { name: 'currency', label: t('quotes.currency'), type: 'select', options: [{ value: 'RMB', label: 'RMB' }, { value: 'USD', label: 'USD' }, { value: 'EUR', label: 'EUR' }] },
      { name: 'description', label: t('expenses.description') },
      { name: 'date', label: t('expenses.date'), type: 'date' },
    ];
    simpleFields.forEach((f) => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      if (f.type === 'select') {
        wrap.innerHTML = `<label>${esc(f.label)}</label><select name="${f.name}">${f.options.map((o) => `<option value="${esc(o.value)}" ${f.name === 'currency' && o.value === defaultCurrency ? 'selected' : ''}>${esc(o.label)}</option>`).join('')}</select>`;
      } else {
        wrap.innerHTML = `<label>${esc(f.label)}</label><input type="${f.type || 'text'}" name="${f.name}" ${f.step ? `step="${f.step}"` : ''}>`;
      }
      form.appendChild(wrap);
    });

    const photoWrap = document.createElement('div');
    photoWrap.className = 'field';
    photoWrap.innerHTML = `<label>${t('expenses.photo')}</label><input type="file" name="photo" accept="image/*">`;
    form.appendChild(photoWrap);

    const actions = document.createElement('div');
    actions.className = 'modal-actions';
    actions.innerHTML = `<button type="button" class="btn" id="exp-cancel">${t('action.cancel')}</button><button type="submit" class="btn btn-primary" form="expense-form">${t('action.save')}</button>`;
    modal.appendChild(actions);
    modal.querySelector('#exp-cancel').addEventListener('click', () => overlay.remove());

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      let category = form.category.value;
      const saveCategory = !!(form.saveCategory && form.saveCategory.checked);
      if (category === 'other') {
        const custom = (form.customCategory.value || '').trim();
        if (!custom) { toast(t('expenses.customCategoryRequired')); return; }
        category = custom;
      }

      const out = {
        category,
        amount: Number(form.amount.value) || 0,
        currency: form.currency.value,
        description: form.description.value,
        date: form.date.value,
      };
      const file = form.querySelector('[name="photo"]').files[0];

      function finish(photoDataUrl) {
        api('expenses', { method: 'POST', body: { ...out, photoDataUrl } })
          .then(async () => {
            if (saveCategory && category) {
              await api('expense-categories', { method: 'POST', body: { name: category } }).catch(() => {});
            }
            overlay.remove();
            toast('Saved');
            onSaved();
          })
          .catch((err) => toast(err.message));
      }

      if (file) {
        const reader = new FileReader();
        reader.onload = () => finish(reader.result);
        reader.readAsDataURL(file);
      } else {
        finish(null);
      }
    });
  }
